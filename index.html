    const SHEETS = {
      master: '1V1oaEy6ToV3LZt0et9bIWEJQbPrYZg73tDxGelhiFn8',
      counties: {
        hays:   '1V1oaEy6ToV3LZt0et9bIWEJQbPrYZg73tDxGelhiFn8', // same sheet for now — candidates tab

        bexar:  '',

    const POSITION_KEYS = [
      'reproductiveRights','immigration','gunPolicy','education',
      'healthcare','climate','moneyInPolitics','socialSecurity','affordability'

    // ─── CHALLENGE ENCODE / DECODE ───
    // Encodes answers+ranks into a ~18-char URL-safe string
    // Format: for each of 9 POSITION_KEYS in order → choice (A/B/C/D/X) + rank (1-9, '0'=10, 'X'=unanswered)
    function encodeChallenge(answers, ranks) {
      return POSITION_KEYS.map(key => {
        const choice = answers[key];
        if (!choice) return 'XX';
        const rank = ranks[key] || 5;
        return choice + (rank === 10 ? '0' : String(rank));
      }).join('');
    }

    function decodeChallenge(str) {
      if (!str || str.length !== 18) return null;
      const answers = {}, ranks = {};
      POSITION_KEYS.forEach((key, i) => {
        const choice = str[i * 2];
        const rankChar = str[i * 2 + 1];
        if (choice !== 'X') {
          answers[key] = choice;
          ranks[key] = rankChar === '0' ? 10 : parseInt(rankChar) || 5;
        }
      });
      return { answers, ranks };
    }

    function buildChallengeUrl(answers, ranks) {
      const code = encodeChallenge(answers, ranks);
      const base = window.location.origin + window.location.pathname;
      return `${base}?c=${code}`;
    }

    const COUNTY_META = {

      travis: { name: 'Travis County' },
      bexar:  { name: 'Bexar County' },
      harris: { name: 'Harris County' },

    async function fetchSheet(sheetId, tabName) {
      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tabName)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Could not load "${tabName}" tab — check the sheet is published to web (File → Share → Publish to web).`);
      const text = await res.text();
      const { data } = Papa.parse(text, { header: true, skipEmptyLines: true });
      return data;
    }

    function buildIssues(rows) {
      // Legacy ID renames — sheet may still use old IDs
      const ID_ALIASES = { democracy: 'moneyInPolitics', water: 'affordability' };

        const rawId = row.id || row.ID;
        const id = ID_ALIASES[rawId] || rawId;
        const builtin = ISSUES.find(i => i.id === id) || {};
        const pick = (sheetVal, fallback) => (sheetVal && !sheetVal.endsWith('…')) ? sheetVal : fallback;
        return {
          id,
          icon: builtin.icon,
          symbol: builtin.symbol,
          topic: row.topic || builtin.topic,
          emphasis: builtin.emphasis,
          question: row.question || builtin.question,
          A:      pick(row.optionA, builtin.A),
          shortA: pick(row.shortA,  builtin.shortA),
          B:      pick(row.optionB, builtin.B),
          shortB: pick(row.shortB,  builtin.shortB),
          C:      pick(row.optionC, builtin.C),
          shortC: pick(row.shortC,  builtin.shortC),
          D:      row.optionD || builtin.D || "This issue is important, but it won't decide my vote.",
          fact:   row.fact || builtin.fact,
          hoverDesc: row.hoverDesc || builtin.hoverDesc,
        };
      }).filter(i => i.id);

      'James Talarico': {
        reproductiveRights: `Talarico, as a state representative, voted against Texas’s abortion ban and has called for restoring exceptions for rape, incest, and medical emergencies.`,
        education: `Talarico served on the House Public Education Committee and led opposition to school voucher bills, arguing they would defund public schools.`,

    function buildRaces(rows) {
      const raceMap = {};
      rows.forEach(row => {
        if (!row.office || !row.name) return; // skip non-candidate rows
        if (!raceMap[row.office]) {
          const rawCat = row.category || 'state';
          const category = rawCat === 'statewide' ? 'state' : rawCat === 'local' ? 'county' : rawCat;
          raceMap[row.office] = {
            office: row.office,
            category,
            districtType: row.districtType || null,
            districtNumber: row.districtNumber ? String(row.districtNumber) : null,
            description: row.description || '',
            candidates: []
          };
        }
        const positions = {};
        const evidence = {};
        POSITION_KEYS.forEach(k => {
          positions[k] = row[k] || null;
          evidence[k] = row[k + 'Evidence'] || EVIDENCE_FALLBACK[row.name]?.[k] || null;
        });
        raceMap[row.office].candidates.push({
          name: row.name,
          party: row.party,
          confirmed: ['true','yes','TRUE','Yes'].includes(row.confirmed),
          website: row.website || null,
          photo: row.photo || null,
          summary: row.hook2 || HOOK2_FALLBACK[row.name] || row.summary || '',
          hook: row.hook1 || HOOK1_FALLBACK[row.name] || null,
          positions,
          evidence
        });
      });
      return Object.values(raceMap);
    }

    function buildCountyRaces(statewideRaces, localRaces) {
      const all = [...statewideRaces, ...localRaces];
      return {
        federal:  all.filter(r => r.category === 'federal'),
        state:    all.filter(r => r.category === 'state'),
        county:   all.filter(r => r.category === 'county'),
        judicial: all.filter(r => r.category === 'judicial'),

    function calcMatch(candidate, answers) {
      // D = "doesn't drive my vote" — excluded from scoring entirely
      const answered = Object.keys(answers).filter(id => answers[id] !== 'D');
      if (answered.length === 0) return null;
      let score = 0;
      answered.forEach(id => {
        const userChoice = answers[id];
        const candPos = candidate.positions[id];
        if (userChoice === 'B') {
          score += 0.5; // moderate = half credit regardless of candidate position
        } else if (userChoice === candPos) {
          score += 1;
        }
      });
      return Math.round((score / answered.length) * 100);
    }

    function matchedIssues(candidate, answers, issues) {
      return issues.map(issue => ({
        ...issue,
        answered: issue.id in answers && answers[issue.id] !== 'D',
        matched: answers[issue.id] === candidate.positions[issue.id],
        partial: answers[issue.id] === 'B',
        userChoice: answers[issue.id],
        candidateChoice: candidate.positions[issue.id]
      })).filter(i => i.answered);
    }

    function getInitials(name) {
      return name.split(' ').filter(w => /^[A-Z]/.test(w)).map(w => w[0]).join('').slice(0, 2);

        function initAutocomplete() {
          if (!inputRef.current || !window.google) return;
          const ac = new window.google.maps.places.Autocomplete(inputRef.current, {
            types: ['address'],
            componentRestrictions: { country: 'us' },

      async function handleSearch() {
        const addr = inputRef.current?.value?.trim() || '';
        if (!addr) { setError('Please enter your street address.'); return; }
        setIsSearching(true); setError(null);
        try {
          const GEOCODIO_KEY = '59cc9999fb36698b393c3f1c3861cab815fb35c';
          const res = await fetch(`https://api.geocod.io/v1.9/geocode?q=${encodeURIComponent(addr)}&fields=cd120,stateleg&api_key=${GEOCODIO_KEY}`);
          if (!res.ok) throw new Error('Lookup failed');
          const data = await res.json();
          const result = data.results && data.results[0];
          if (!result) { setError('Address not found. Try the full address with city and state.'); setIsSearching(false); return; }
          const components = result.address_components || {};
          if (county === 'hays' && components.county && !components.county.toLowerCase().includes('hays')) {

          const fields = result.fields || {};

          const cd = fields.congressional_districts && fields.congressional_districts[0];
          const stateLeg = fields.state_legislative_districts || {};
          const senate = stateLeg.senate && stateLeg.senate[0];
          const house = stateLeg.house && stateLeg.house[0];
          let commPrecinct = null, jpPrecinct = null;
          try {
            const [commData, jpData] = await Promise.all([

              fetch(`https://services5.arcgis.com/bVphnK8rPe5MHUSr/arcgis/rest/services/HaysCoJusticeOfPeace/FeatureServer/0/query?geometry=${loc.lng},${loc.lat}&geometryType=esriGeometryPoint&inSR=4326&spatialRel=esriSpatialRelIntersects&outFields=PRECINCT&f=json`).then(r=>r.json()).catch(()=>null)

    // ─── QUIZ ───
    function Quiz({ onSave, onBack, onStartOver, issue, initialAnswer = null, initialRank = null }) {

      function pillColor(n) {
        if (!selected) return null;
        const [r, g, b] = RANK_RGB[selected] || [100,116,139];
        const intensity = 0.2 + ((n - 1) / 9) * 0.8;
        const mix = (channel) => Math.round(255 - intensity * (255 - channel));
        return `rgb(${mix(r)},${mix(g)},${mix(b)})`;
      }

      function handleSelect(choice) {
        if (choice === 'D') {
          onSave('D', 3);
          return;

      function handleSave() {

      if (!issue) return null;

      const VIEW_COLOR_HEX = { A: '#3b82f6', B: '#a855f7', C: '#ef4444', D: '#64748b' };

      const selColorDark = VIEW_COLOR_DARK[selected] || '#334155';

      return (

                <div className="flex items-center gap-4 lg:gap-6 px-5 lg:px-8 pt-5 lg:pt-8 pb-3 lg:pb-5">
                  <div className="shrink-0 w-14 h-14 lg:w-28 lg:h-28 rounded-2xl flex items-center justify-center overflow-hidden" style={{background:'rgba(255,255,255,0.10)', border:'1px solid rgba(255,255,255,0.15)'}}>
                    <img

                {(issue.hoverDesc || issue.fact) && (

            {/* ── RIGHT: View choices ── */}
            <div className="lg:w-1/2 flex flex-col">
              <h2 className="text-xl lg:text-4xl font-bold text-white leading-snug mb-3 lg:mb-4">

              {(() => {

                              style={{border:'1.5px solid rgba(255,255,255,0.5)', letterSpacing:'0.1em'}}>
                              ← Change

                          </div>
                          <div className="px-5 lg:px-7 py-4 lg:py-6" style={{background:`linear-gradient(160deg,${v.color}22,${v.color}0a)`}}>

                      {/* Rank gauge + stacked buttons — only after a view is chosen and not browsing */}
                      {selected && selected !== 'D' && !browsingViews && (
                        <div className="mt-3 flex flex-col gap-3 w-full">
                          {/* Rank gauge — full width */}
                          <div className="p-3 lg:p-5 rounded-2xl transition-all duration-300" style={{border: rank ? `2px solid ${selColor}66` : '2px solid rgba(251,191,36,0.7)', boxShadow: rank ? 'none' : '0 0 18px rgba(251,191,36,0.35)', background:`linear-gradient(160deg,${selColor}14,${selColor}06)`}}>
                            <div className="flex items-center justify-between mb-3">
                              <p className="text-xs lg:text-sm font-black text-slate-300 uppercase tracking-widest">How much does this drive your vote?</p>
                              {rank && <span className="text-xs lg:text-sm font-black text-white">{rank}/10</span>}
                            </div>
                            <div className="flex gap-1 lg:gap-2">
                              {Array.from({length: 10}, (_, i) => i + 1).map(n => {

                                return (
                                  <button key={n} onClick={() => setRank(n)}
                                    className="flex-1 h-2 lg:h-4 rounded-full transition-all duration-150 hover:opacity-90"

                            </div>
                          </div>
                          {/* ADD VIEW — standalone */}
                          {rank && (
                            <div className="text-center">

                      {selected === 'D' && (

                      No Opinion on this issue

              })()}
            </div>

    }

    // ─── SUMMARY ───
    function Summary({ issues, answers, ranks, onMatchAll, onMatchMine, onViewConstellation, onAnswerMore, onHome, onStartOver, onBallot, county }) {
      const [showChallenge, setShowChallenge] = React.useState(false);
      const [showAddressModal, setShowAddressModal] = React.useState(false);
      const [ballotMode, setBallotMode] = React.useState(false);
      const [copied, setCopied] = React.useState(false);
      const [showDrop, setShowDrop] = React.useState(false);

      function handleCopy() {
        const url = buildChallengeUrl(answers, ranks);
        navigator.clipboard.writeText(url).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        });
      }

      function handleEmail() {
        const url = buildChallengeUrl(answers, ranks);
        const subject = encodeURIComponent("I challenged you on VoteYourViews.org");
        const body = encodeURIComponent(`I just ranked my beliefs on VoteYourViews.org — a nonpartisan Texas voter guide.\n\nTake the quiz and see how your views compare to mine:\n${url}\n\nIt only takes a few minutes!`);
        window.open(`mailto:?subject=${subject}&body=${body}`);
      }

      function handleText() {
        const url = buildChallengeUrl(answers, ranks);
        const msg = encodeURIComponent(`I challenged you on VoteYourViews.org — take the quiz and see how your views compare to mine: ${url}`);
        window.open(`sms:?&body=${msg}`);
      }
      const VIEW_LABEL  = { A: 'Liberal', B: 'Moderate', C: 'Conservative', D: 'No Opinion' };
      const VIEW_COLOR  = { A: '#3b82f6', B: '#a855f7', C: '#ef4444', D: '#64748b' };
      const VIEW_BG     = { A: 'rgba(59,130,246,0.22)', B: 'rgba(168,85,247,0.22)', C: 'rgba(239,68,68,0.22)', D: 'rgba(100,116,139,0.15)' };
      const VIEW_BG_TOP = { A: 'rgba(59,130,246,0.38)', B: 'rgba(168,85,247,0.38)', C: 'rgba(239,68,68,0.38)', D: 'rgba(100,116,139,0.22)' };

      const answeredIssues   = issues.filter(i => answers[i.id]);
      const unansweredIssues = issues.filter(i => !answers[i.id]);
      const answeredCount    = answeredIssues.length;
      const canConstellation = answeredCount >= 3;

      // Sort answered by rank descending (most important first), then unanswered at end
      const sortedAnswered = [...answeredIssues].sort((a,b) => (ranks[b.id]||5) - (ranks[a.id]||5));
      const allIssuesOrdered = [...sortedAnswered, ...unansweredIssues];
      // Only show #1 badge if the top issue has a strictly higher rank than the second
      const topRank = sortedAnswered[0] ? (ranks[sortedAnswered[0].id]||5) : 0;
      const secondRank = sortedAnswered[1] ? (ranks[sortedAnswered[1].id]||5) : 0;
      const hasUniqueTop = sortedAnswered.length > 0;
      const topRankValue = sortedAnswered[0] ? (ranks[sortedAnswered[0].id]||5) : 0;
      // Dominant color — most common view among answered issues
      const viewCounts = { A:0, B:0, C:0 };
      answeredIssues.forEach(i => { if(answers[i.id] && answers[i.id] !== 'D') viewCounts[answers[i.id]]++; });
      const dominantChoice = Object.entries(viewCounts).sort((a,b)=>b[1]-a[1])[0]?.[0] || 'A';
      const dominantColor = VIEW_COLOR[dominantChoice] || '#3b82f6';
      const dominantColorDark = dominantChoice === 'C' ? '#991b1b' : dominantChoice === 'B' ? '#7e22ce' : '#1d4ed8';
      const dominantColorMid = dominantChoice === 'C' ? '#dc2626' : dominantChoice === 'B' ? '#9333ea' : '#2563eb';

      return (
        <div className="min-h-screen flex flex-col" style={{background:'linear-gradient(160deg,#0f172a 0%,#020617 100%)'}}>

          {/* Header */}
          <div className="border-b border-slate-800 px-4 py-3">
            <div className="max-w-5xl mx-auto flex items-center justify-between">
              <button onClick={onHome} className="text-sm text-slate-400 hover:text-white font-medium transition-colors">← Home</button>
              <div className="text-sm font-bold text-white tracking-wide uppercase" style={{fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'0.1em'}}>Your Views</div>
              <button onClick={onStartOver} className="text-xs text-slate-500 hover:text-red-400 font-medium transition-colors">Start Over</button>
            </div>
          </div>

          <div className="flex-1 max-w-5xl mx-auto w-full px-4 lg:px-24 py-4">

            {/* Headline */}
            <div className="mb-3 text-center">
              <h1 className="font-black text-2xl lg:text-4xl leading-tight mb-1">
                <span className="text-slate-400 font-light text-lg lg:text-2xl lowercase mr-1">your</span>
                <span className="text-white uppercase">View of Views</span>
              </h1>
            </div>

            {/* ── Answered issues ── */}
            {sortedAnswered.length > 0 && (
              <>
                <div className="flex flex-col gap-1.5 mb-2 mt-10">
                  <div className="flex items-center gap-2">
                    <div className="flex gap-1">
                      {Array.from({length:9},(_,i) => {
                        const dotIssue = sortedAnswered[i];
                        const dotColor = dotIssue ? VIEW_COLOR[answers[dotIssue.id]] : null;
                        return <div key={i} className="w-5 h-2 rounded-full transition-all" style={{background: dotColor || 'rgba(255,255,255,0.12)'}} />;
                      })}
                    </div>
                    <span className="text-slate-400 text-[10px] font-bold">{answeredCount}/9</span>
                  </div>
                  <span className="text-slate-500 text-[10px] uppercase tracking-widest font-semibold">Your Custom Ranking</span>
                </div>
                <div className="grid grid-cols-3 lg:grid-cols-5 gap-3 lg:gap-4 mb-3">
                  {sortedAnswered.map((issue, idx) => {
                    const choice = answers[issue.id];
                    const rank = ranks[issue.id] || 0;
                    const color = VIEW_COLOR[choice];
                    const isTopIssue = (ranks[issue.id]||5) === topRankValue && hasUniqueTop;
                    return (
                      <button

                        style={{
                          background: isTopIssue

                          border: isTopIssue ? `2px solid ${color}` : `1px solid ${color}aa`,
                          boxShadow: isTopIssue ? `0 0 28px ${color}66, 0 0 10px ${color}44` : `0 0 14px ${color}38`
                        }}
                      >
                        {/* Fixed-size image area */}
                        <div className="w-full px-3 pt-3 flex-shrink-0">
                          <div className="w-full" style={{height:'85px', display:'flex', alignItems:'center', justifyContent:'center'}}>
                            <img
                              src={`./icons/symbols/${issue.symbol}.png`}
                              alt={issue.topic}
                              style={{maxWidth:'90%', maxHeight:'85px', objectFit:'contain'}}
                              onError={e => { e.target.style.display='none'; }}
                            />
                          </div>
                        </div>
                        {/* Fixed rank bar area */}
                        <div className="w-full px-2 pt-2" style={{height:'36px'}}>
                          {rank > 0 && (
                            <>
                              <div className="flex gap-0.5">
                                {Array.from({length:10},(_,i)=>i+1).map(n => (
                                  <div key={n} className="flex-1 h-2 rounded" style={{background: n <= rank ? color : 'rgba(255,255,255,0.12)'}} />
                                ))}
                              </div>
                              <p className="text-[10px] text-right mt-0.5 font-black" style={{color: 'rgba(255,255,255,0.75)'}}>{rank}/10</p>
                            </>
                          )}
                        </div>
                        {/* Fixed text area — always 2-line topic height */}
                        <div className="w-full px-2 pb-3 text-center">
                          <p className="text-white text-sm font-bold leading-tight mb-0" style={{fontFamily:"'Barlow Condensed',sans-serif", minHeight:'2.5em', display:'flex', alignItems:'center', justifyContent:'center'}}>{issue.topic.replace(' & Border','').replace('Reproductive','Reprod.')}</p>
                          <p className="text-xs font-bold mt-0" style={{color, marginTop:'-2px'}}>{VIEW_LABEL[choice]}</p>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </>
            )}

            {/* ── 3 CTAs ── */}
            <div className={`max-w-xl mx-auto mb-3 px-2 ${answeredCount === 0 ? 'opacity-30 pointer-events-none' : ''}`} style={{marginTop:'70px'}}>
              <div className="flex flex-col gap-2">
                  <div className={`relative ${BTN.wrap}`}>
                    <div className="flex rounded-full overflow-hidden"
                      style={{background:`linear-gradient(90deg,${dominantColorDark},${dominantColorMid})`}}>
                      <button onClick={() => setShowDrop(d => !d)}
                        className={`flex-1 ${BTN.primary}`}
                        style={{letterSpacing:'0.12em'}}>

                      </button>
                      <button onClick={() => setShowDrop(d => !d)}
                        className="px-4 border-l border-white/20 text-white hover:bg-white/10 transition-colors flex items-center">
                        <svg className={`w-3.5 h-3.5 transition-transform ${showDrop ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}>
                          <path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7"/>
                        </svg>
                      </button>
                    </div>
                    {showDrop && (
                      <div className="absolute top-full mt-1 left-0 right-0 rounded-2xl overflow-hidden shadow-xl z-20 border border-white/10"
                        style={{background:'#1e293b'}}>
                        <button onClick={() => { setShowDrop(false); setBallotMode(true); setShowAddressModal(true); }}
                          className="w-full px-5 py-3 text-left text-xs font-black uppercase tracking-widest text-white hover:bg-white/10 transition-colors border-b border-white/10"
                          style={{letterSpacing:'0.1em'}}>
                          Build My Ballot
                        </button>
                        <button onClick={() => { setShowDrop(false); onMatchAll(); }}
                          className="w-full px-5 py-3 text-left text-xs font-black uppercase tracking-widest text-white hover:bg-white/10 transition-colors border-b border-white/10"
                          style={{letterSpacing:'0.1em'}}>

                        <button onClick={() => { setShowDrop(false); setShowAddressModal(true); }}
                          className="w-full px-5 py-3 text-left text-xs font-black uppercase tracking-widest text-white hover:bg-white/10 transition-colors"

                <div className="flex items-center justify-center gap-3 py-2">
                  {[['Save','💾'],['Send','📤'],['Share','🔗']].map(([label], i) => (

            {/* ── Address Modal ── */}
            {showAddressModal && (
              <AddressModal

                accentColor={dominantColorMid}

                onClose={() => setShowAddressModal(false)}
                onContinue={(districts) => { setShowAddressModal(false); setBallotMode(false); if (ballotMode) { onBallot(districts); } else { onMatchMine(districts); } }}
                onShowAll={ballotMode ? undefined : () => { setShowAddressModal(false); onMatchAll(); }}

            {/* ── Challenge Modal ── */}
            {showChallenge && (
              <div className="fixed inset-0 z-50 flex items-center justify-center px-4" onClick={() => setShowChallenge(false)}>
                <div className="absolute inset-0 bg-black/60" />
                <div className="relative w-full max-w-sm rounded-2xl overflow-hidden shadow-2xl border border-slate-700"
                     style={{background:'linear-gradient(160deg,#0f172a,#020617)'}}
                     onClick={e => e.stopPropagation()}>
                  <div className="px-6 pt-6 pb-2">
                    <h2 className="text-white font-black text-xl mb-1">Challenge a Friend</h2>
                    <p className="text-slate-400 text-sm leading-relaxed">Share this link. They take the quiz — then see how your views compare.</p>
                  </div>

                  {/* URL preview */}
                  <div className="mx-6 my-4 px-3 py-2 rounded-lg bg-slate-800 border border-slate-700">
                    <p className="text-slate-400 text-xs font-mono truncate">{buildChallengeUrl(answers, ranks)}</p>
                  </div>

                  {/* Options */}
                  <div className="px-6 pb-6 flex flex-col gap-2">
                    <button onClick={handleCopy}
                      className="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl text-sm transition-colors flex items-center justify-center gap-2">
                      {copied ? '✓ Copied!' : '📋 Copy Link'}
                    </button>
                    <button onClick={handleEmail}
                      className="w-full py-3 border border-slate-600 text-slate-300 hover:border-slate-400 hover:text-white font-bold rounded-xl text-sm transition-colors flex items-center justify-center gap-2">
                      ✉️ Send Email
                    </button>
                    <button onClick={handleText}
                      className="w-full py-3 border border-slate-600 text-slate-300 hover:border-slate-400 hover:text-white font-bold rounded-xl text-sm transition-colors flex items-center justify-center gap-2">
                      💬 Send Text
                    </button>
                    <button onClick={() => setShowChallenge(false)}
                      className="w-full py-2 text-slate-500 hover:text-slate-300 text-sm font-medium transition-colors mt-1">
                      ✕ Close
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* ── Unanswered issues ── */}
            {unansweredIssues.length > 0 && (
              <>
                <div className="flex items-center gap-3 mb-4">
                  <div className="flex-1 border-t border-slate-500" />
                  <p className="text-white text-sm uppercase tracking-widest font-black whitespace-nowrap">+ Add more views</p>
                  <div className="flex-1 border-t border-slate-500" />
                </div>
                <div className="flex flex-wrap gap-2 mb-10">
                  {unansweredIssues.map((issue) => (
                    <button
                      key={issue.id}
                      onClick={() => onAnswerMore(issue.id)}
                      className="group relative flex flex-col items-center gap-1 transition-opacity duration-200"
                      style={{width: '72px'}}
                    >
                      <div className="relative w-full aspect-square rounded-xl overflow-hidden ring-1 ring-white/10 group-hover:ring-white/30 group-active:scale-95 transition-all duration-150 shadow-lg">
                        <img
                          src={`./icons/${issue.icon || issue.id}.png`}
                          alt={issue.topic}
                          className="w-full h-full object-cover"
                          onError={e => { e.target.style.display='none'; e.target.parentNode.style.background='#1e293b'; }}
                        />
                      </div>
                      <span className="text-slate-300 text-[10px] font-bold text-center leading-tight group-hover:text-white transition-all duration-150 px-0.5" style={{fontFamily:"'Barlow Condensed', sans-serif"}}>
                        {issue.topic.replace('Social Security & Medicare','Social Programs').replace('Housing & Affordability','Affordability')}
                      </span>
                    </button>
                  ))}
                </div>
              </>
            )}



          </div>
        </div>
      );
    }

    // ─── CONSTELLATION ───
    const STAR_COLORS  = { A: '#3b82f6', B: '#a855f7', C: '#ef4444', D: '#64748b' };
    const STAR_BASE_RGB = { A: [59,130,246], B: [168,85,247], C: [239,68,68], D: [100,116,139] };
    const CHOICE_LABEL = { A: 'Progressive', B: 'Moderate', C: 'Conservative', D: 'Independent' };

    // Returns an rgb() color for a star — same white→vivid interpolation as the rank gauge
    function starColor(choice, rank) {
      const [r, g, b] = STAR_BASE_RGB[choice] || STAR_BASE_RGB.D;
      const intensity = 0.18 + ((rank - 1) / 9) * 0.82; // 0.18 at rank 1 → 1.0 at rank 10
      const mix = ch => Math.round(255 - intensity * (255 - ch));
      return `rgb(${mix(r)},${mix(g)},${mix(b)})`;
    }

    // Fixed constellation positions for up to 9 stars (% of SVG 400×300 viewbox)
    const STAR_POSITIONS = [
      { x: 50,  y: 22 }, // #1 — center-top (largest/most important)
      { x: 26,  y: 40 }, // #2
      { x: 73,  y: 35 }, // #3
      { x: 42,  y: 57 }, // #4
      { x: 18,  y: 62 }, // #5
      { x: 67,  y: 60 }, // #6
      { x: 34,  y: 76 }, // #7
      { x: 60,  y: 79 }, // #8
      { x: 80,  y: 50 }, // #9
    ];

    // Which star positions to connect with lines
    const CONNECTIONS = [[0,1],[0,2],[1,3],[2,5],[3,4],[3,5],[5,7],[4,6],[6,7],[2,8],[5,8]];

    function ConstellationScreen({ issues, answers, ranks, onContinue, onRetake }) {
      // Only issues the user answered (any choice including D)
      const answered = issues.filter(i => i.id in answers);
      // Sort descending by rank — highest rank = most important = biggest star
      const sorted = [...answered].sort((a, b) => (ranks[b.id] || 5) - (ranks[a.id] || 5));
      const topIssue = sorted[0];
      const topChoice = topIssue ? answers[topIssue.id] : null;
      const topRank   = topIssue ? (ranks[topIssue.id] || 5) : 10;
      const topColor  = topChoice ? starColor(topChoice, topRank) : '#3b82f6';
      const topColorVivid = topChoice ? STAR_COLORS[topChoice] : '#3b82f6';

      // Star radius: rank 10 → 20px, rank 1 → 5px
      const starR = rank => Math.round(5 + (rank - 1) * 1.67);

      // Figure out the dominant lean
      const choiceCounts = { A: 0, B: 0, C: 0, D: 0 };
      answered.forEach(i => { choiceCounts[answers[i.id]]++; });
      const dominant = Object.entries(choiceCounts).sort((a,b) => b[1]-a[1])[0]?.[0] || 'A';
      const leanLabel = CHOICE_LABEL[dominant];
      const leanColor = STAR_COLORS[dominant];

      return (
        <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center px-4 py-10">

          {/* ── The card ── */}
          <div className="w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl border border-slate-700/60"
               style={{ background: 'linear-gradient(160deg, #0f172a 0%, #020617 100%)' }}>

            {/* Header */}
            <div className="text-center pt-7 pb-1 px-6">
              <p className="text-slate-300 text-[10px] tracking-[0.2em] uppercase font-semibold">VoteYourViews.org</p>
              <h1 className="text-white text-xl font-black mt-1 tracking-tight">My Political Constellation</h1>
              <p className="text-slate-400 text-xs mt-0.5">Hays County, Texas · 2026</p>
            </div>

            {/* #1 issue banner */}
            {topIssue && (
              <div className="mx-5 mt-4 rounded-xl px-4 py-2.5 text-center"
                   style={{ backgroundColor: topColorVivid + '18', border: `1px solid ${topColorVivid}40` }}>
                <p className="text-[10px] uppercase tracking-widest font-semibold" style={{ color: topColorVivid + 'cc' }}>My #1 Issue</p>
                <p className="text-white font-black text-lg leading-tight mt-0.5">{topIssue.topic}</p>
              </div>
            )}

            {/* SVG star field */}
            <svg viewBox="0 0 400 320" className="w-full px-2 mt-1">
              {/* Background twinkle dots */}
              {[[15,20],[85,10],[90,70],[10,80],[50,90],[30,50],[70,85],[5,45]].map(([x,y],i) => (
                <circle key={i} cx={x*4} cy={y*3} r="1" fill="#ffffff" opacity="0.2" />
              ))}
              {/* Connecting lines */}
              {CONNECTIONS.map(([i,j]) => {
                if (!sorted[i] || !sorted[j]) return null;
                const p1 = STAR_POSITIONS[i], p2 = STAR_POSITIONS[j];
                return (
                  <line key={`${i}-${j}`}
                    x1={p1.x*4} y1={p1.y*3}
                    x2={p2.x*4} y2={p2.y*3}
                    stroke="#334155" strokeWidth="1" strokeDasharray="3 3" />
                );
              })}
              {/* Stars */}
              {sorted.map((issue, idx) => {
                const pos = STAR_POSITIONS[idx];
                if (!pos) return null;
                const cx = pos.x * 4, cy = pos.y * 3;
                const rank = ranks[issue.id] || 5;
                const r = starR(rank);
                const choice = answers[issue.id] || 'D';
                const color = starColor(choice, rank);
                const shortLabel = issue.topic.replace(' & ', '/').split(' ').slice(0,3).join(' ');
                return (
                  <g key={issue.id}>
                    {/* Glow — same intensity color, faded */}
                    <circle cx={cx} cy={cy} r={r + 7} fill={color} opacity="0.15" />
                    <circle cx={cx} cy={cy} r={r + 3} fill={color} opacity="0.25" />
                    {/* Star */}
                    <circle cx={cx} cy={cy} r={r} fill={color} />
                    {/* Rank badge for #1 — use vivid color so label is readable */}
                    {idx === 0 && (
                      <text x={cx} y={cy - r - 7} textAnchor="middle" fill={STAR_COLORS[choice] || color} fontSize="9" fontWeight="700">#1</text>
                    )}
                    {/* Label */}
                    <text x={cx} y={cy + r + 13} textAnchor="middle" fill="#94a3b8" fontSize="9">{shortLabel}</text>
                  </g>
                );
              })}
            </svg>

            {/* Legend */}
            <div className="flex justify-center gap-4 px-6 pb-2">
              {[['A','#3b82f6','Progressive'],['B','#a855f7','Moderate'],['C','#ef4444','Conservative']].map(([k,c,label]) => (
                choiceCounts[k] > 0 && (
                  <div key={k} className="flex items-center gap-1.5">
                    <div className="w-2 h-2 rounded-full" style={{ backgroundColor: c }} />
                    <span className="text-slate-400 text-[10px]">{label}</span>
                  </div>
                )
              ))}
            </div>

            {/* Lean summary */}
            <div className="text-center pb-5 px-6">
              <p className="text-[10px] text-slate-400 uppercase tracking-widest">Overall Lean</p>
              <p className="font-black text-sm mt-0.5" style={{ color: leanColor }}>{leanLabel}</p>
              <p className="text-[10px] text-slate-500 mt-3">Find your constellation · VoteYourViews.org</p>
            </div>
          </div>

          {/* CTAs */}
          <button
            onClick={onContinue}
            className="mt-7 w-full max-w-sm py-4 bg-white text-slate-900 font-black rounded-xl hover:bg-slate-100 transition-colors text-base tracking-tight"
          >
            Match My Candidates →
          </button>

          <button
            onClick={() => alert('Sharing coming soon! Your constellation card will be shareable as an image and link.')}
            className="mt-3 w-full max-w-sm py-3.5 border border-slate-600 text-slate-300 font-semibold rounded-xl hover:border-slate-400 hover:text-white transition-colors text-sm flex items-center justify-center gap-2"
          >
            <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
            </svg>
            Share My Constellation
          </button>

          <button
            onClick={onRetake}
            className="mt-3 text-slate-600 text-sm hover:text-slate-400 transition-colors"
          >
            ← Retake the Quiz
          </button>
        </div>
      );
    }

    // ─── RESULTS ───
    const RACE_SECTIONS = [
      { key: 'federal',  label: 'Federal Races' },
      { key: 'state',    label: 'Statewide Races' },
      { key: 'county',   label: 'County Races' },
      { key: 'judicial', label: 'Judicial Races' },
    ];

    function allRacesFor(countyData) {
      return RACE_SECTIONS.flatMap(s => countyData[s.key] || []);
    }

    function filterRacesByDistrict(races, userDistricts) {
      if (!userDistricts) return races;
      return races.filter(race => {
        if (!race.districtType) return true;
        const num = String(race.districtNumber);
        if (race.districtType === 'congressional') return !userDistricts.congressionalDistrict || userDistricts.congressionalDistrict === num;
        if (race.districtType === 'stateSenate') return !userDistricts.stateSenate || userDistricts.stateSenate === num;
        if (race.districtType === 'stateHouse') return !userDistricts.stateHouse || userDistricts.stateHouse === num;
        if (race.districtType === 'jpPrecinct') return !userDistricts.jpPrecinct || userDistricts.jpPrecinct === num;
        if (race.districtType === 'commissioner') return !userDistricts.commissionerPrecinct || userDistricts.commissionerPrecinct === num;
        return true;
      });
    }

    function Results({ county, counties, issues, answers, selected, setSelected, userDistricts, onBallot, onRetake, onBrowse }) {
      const countyData = counties[county];
      const allRaces = RACE_SECTIONS.flatMap(s => filterRacesByDistrict(countyData[s.key] || [], userDistricts));
      const [expandedRace, setExpandedRace] = useState(null);

      // Auto-select best-matching candidate for each race
      useEffect(() => {
        const autoSelected = {};
        allRaces.forEach(race => {
          const [c1, c2] = race.candidates.filter(Boolean);
          if (!c1) return;
          const s1 = calcMatch(c1, answers);
          const s2 = c2 ? calcMatch(c2, answers) : null;
          if (s1 !== null) {
            autoSelected[race.office] = (s2 !== null && s2 > s1) ? c2.name : c1.name;
          }
        });
        setSelected(prev => ({ ...autoSelected, ...prev }));
      }, []);

      const answeredCount = Object.keys(answers).length;

      return (
        <div className="min-h-screen bg-slate-50">
          <header className="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-10">
            <div className="max-w-3xl mx-auto flex items-center justify-between">
              <button onClick={onRetake} className="text-sm text-slate-500 hover:text-slate-800 font-medium">← Start Over</button>
              <img src="./icons/VoteYourViews_Logo_Color.png" alt="VoteYourViews.org" className="h-8 w-auto" />
              <button
                onClick={onBallot}
                className="text-sm bg-slate-900 text-white font-semibold px-4 py-2 rounded-lg hover:bg-slate-700 transition-colors flex items-center gap-1.5"
              >
                <svg xmlns="http://www.w3.org/2000/svg" className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}>
                  <path strokeLinecap="round" strokeLinejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                </svg>
                Print Ballot
              </button>
            </div>
          </header>

          <main className="max-w-3xl mx-auto px-4 py-10">
            <div className="mb-8 fade-in">
              <h1 className="text-2xl sm:text-3xl font-black text-slate-900 mb-2">Your belief matches</h1>
              <p className="text-slate-500 text-sm">
                Based on your {answeredCount} answers, here's how candidates align with your values. We auto-selected your best match — you can override any race.
              </p>
              {userDistricts && (
                <div className="flex flex-wrap gap-2 mt-3">
                  {userDistricts.congressionalDistrict && <span className="text-xs px-2 py-1 bg-blue-50 text-blue-700 rounded-full border border-blue-100 font-medium">US House: Dist. {userDistricts.congressionalDistrict}</span>}
                  {userDistricts.stateSenate && <span className="text-xs px-2 py-1 bg-blue-50 text-blue-700 rounded-full border border-blue-100 font-medium">TX Senate: Dist. {userDistricts.stateSenate}</span>}
                  {userDistricts.stateHouse && <span className="text-xs px-2 py-1 bg-blue-50 text-blue-700 rounded-full border border-blue-100 font-medium">TX House: Dist. {userDistricts.stateHouse}</span>}
                  {userDistricts.jpPrecinct && <span className="text-xs px-2 py-1 bg-blue-50 text-blue-700 rounded-full border border-blue-100 font-medium">JP Pct {userDistricts.jpPrecinct}</span>}
                  {userDistricts.commissionerPrecinct && <span className="text-xs px-2 py-1 bg-blue-50 text-blue-700 rounded-full border border-blue-100 font-medium">Comm. Pct {userDistricts.commissionerPrecinct}</span>}

            {RACE_SECTIONS.filter(sec => filterRacesByDistrict(countyData[sec.key] || [], userDistricts).length > 0).map((sec, idx) => (

                      selected={selected}
                      onSelect={(office, name) => setSelected(prev => ({ ...prev, [office]: name }))}

            <div className="mt-10 flex flex-col sm:flex-row gap-3">

                <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}>
                  <path strokeLinecap="round" strokeLinejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                </svg>
                Print My Ballot
              </button>
              <button
                onClick={onBrowse}
                className="flex-1 py-4 border-2 border-slate-300 text-slate-700 font-bold rounded-xl hover:border-slate-400 transition-colors text-sm"
              >
                Browse All Candidates
              </button>
            </div>
          </main>
        </div>
      );
    }

    function RaceResultCard({ race, answers, issues, selected, onSelect, expanded, onToggle }) {
      const candidates = race.candidates.filter(Boolean);
      const [c1, c2] = candidates;
      const s1 = calcMatch(c1, answers);
      const s2 = c2 ? calcMatch(c2, answers) : null;
      const recommended = (s1 !== null && s2 !== null) ? (s1 >= s2 ? c1.name : c2.name) : null;
      const currentSelected = selected[race.office];

      return (
        <div className="bg-white border border-slate-200 rounded-xl overflow-hidden">
          {/* Race header */}
          <button
            onClick={onToggle}
            className="w-full px-5 py-4 flex items-center justify-between hover:bg-slate-50 transition-colors text-left"
          >
            <div>
              <div className="font-bold text-slate-900 text-sm">{race.office}</div>
              {currentSelected && (
                <div className="text-xs text-slate-500 mt-0.5 flex items-center gap-1">
                  <span className="text-emerald-600">✓</span> {currentSelected}
                </div>
              )}
            </div>
            <div className="flex items-center gap-2">
              {currentSelected && (
                <span className="text-xs font-semibold text-emerald-700 bg-emerald-50 px-2 py-0.5 rounded-full border border-emerald-200">Selected</span>
              )}
              <svg className={`w-4 h-4 text-slate-400 transition-transform ${expanded ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
              </svg>
            </div>
          </button>

          {/* Candidates side by side */}
          {expanded && (
            <div className="border-t border-slate-100 p-4 fade-in">
              <p className="text-xs text-slate-500 mb-4">{race.description}</p>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                {candidates.map(candidate => {
                  const score = calcMatch(candidate, answers);
                  const isSelected = currentSelected === candidate.name;
                  const isRecommended = recommended === candidate.name;
                  const matched = matchedIssues(candidate, answers, issues);
                  return (
                    <button
                      key={candidate.name}
                      onClick={() => onSelect(race.office, candidate.name)}
                      className={`text-left p-4 rounded-xl border-2 transition-all ${
                        isSelected
                          ? 'border-slate-900 bg-slate-50'
                          : 'border-slate-200 hover:border-slate-300'
                      }`}
                    >
                      {isRecommended && (
                        <div className="text-xs font-bold text-emerald-700 mb-2 flex items-center gap-1">
                          ✦ Best match
                        </div>
                      )}
                      <div className="flex items-center gap-2 mb-2">
                        <Avatar name={candidate.name} photo={candidate.photo} party={candidate.party} size="sm" />
                        <div>
                          <div className="font-bold text-slate-900 text-xs leading-tight">{candidate.name}</div>
                          <PartyBadge party={candidate.party} />
                        </div>
                      </div>
                      {score !== null && <MatchBar score={score} party={candidate.party} />}
                      <p className="text-xs text-slate-500 mt-3 leading-relaxed">{candidate.summary}</p>
                      {!candidate.confirmed && (
                        <p className="text-xs text-amber-600 mt-2 font-medium">⚠ Nominee pending confirmation</p>
                      )}
                      {/* Issue breakdown — matches first, then mismatches */}
                      <div className="mt-3 space-y-1">
                        {[...matched].sort((a,b) => (b.matched ? 2 : b.userChoice==='B' ? 1 : 0) - (a.matched ? 2 : a.userChoice==='B' ? 1 : 0)).slice(0, 4).map(issue => (
                          <div key={issue.id} className="flex items-center gap-1.5 text-xs">
                            <span className={issue.matched ? 'text-emerald-500' : issue.userChoice==='B' ? 'text-amber-500' : 'text-red-400'}>
                              {issue.matched ? '✓' : issue.userChoice==='B' ? '~' : '✗'}
                            </span>
                            <span className={issue.matched ? 'text-slate-700' : issue.userChoice==='B' ? 'text-slate-600' : 'text-slate-400'}>{issue.topic}</span>
                          </div>
                        ))}
                        {matched.length > 4 && (
                          <div className="text-xs text-slate-400">+{matched.length - 4} more issues</div>
                        )}
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── BROWSE ───
    const SECTION_META = {
      federal:  { img: './icons/Federal2.png', accent: 'from-[#0f172a] to-[#1e3a5f]' },
      state:    { img: './icons/State2.png',   accent: 'from-[#1a1a2e] to-[#16213e]' },
      county:   { img: './icons/County.png',   accent: 'from-[#1a1a2e] to-[#0f3460]' },
      judicial: { img: './icons/Judicial.png', accent: 'from-[#1a1a2e] to-[#2d1b69]' },

    // Office definitions — educational context shown in the race header
    function getOfficeInfo(office) {
      const o = office.toLowerCase();
      if (o.includes('u.s. senate') || o.includes('us senate'))
        return 'Texas elects 2 U.S. Senators to 6-year terms. Senators vote on federal legislation, Supreme Court nominees, and treaties. Only one Texas Senate seat is up in 2026.';
      if (o.includes('u.s. house') || o.includes('us house') || o.includes('congress'))
        return 'The U.S. House has 435 members — 38 represent Texas. Each member represents ~750,000 people in their congressional district. House members serve 2-year terms and all 435 seats are up for election in 2026.';
      if (o.includes('lieutenant governor'))
        return 'The Lieutenant Governor presides over the Texas Senate and is widely considered the most powerful office in Texas state government, controlling the legislative agenda. 4-year term.';
      if (o.includes('governor'))
        return 'The Governor is Texas\'s chief executive, serving a 4-year term. The Governor signs or vetoes legislation, commands the National Guard, and appoints thousands of state officials.';
      if (o.includes('attorney general'))
        return 'The Attorney General is Texas\'s chief law enforcement officer — representing the state in legal matters, enforcing consumer protections, and defending state laws. 4-year term.';
      if (o.includes('comptroller'))
        return 'The Comptroller of Public Accounts is Texas\'s chief financial officer — collecting taxes, paying the state\'s bills, and certifying the state budget. 4-year term.';
      if (o.includes('land commissioner') || o.includes('general land'))
        return 'The Commissioner of the General Land Office manages 13 million acres of state land, oversees the Veterans Land Board, and administers federal disaster recovery funds. 4-year term.';
      if (o.includes('agriculture'))
        return 'The Commissioner of Agriculture oversees food safety, pesticide regulation, and agricultural programs for one of the nation\'s largest agricultural states. 4-year term.';
      if (o.includes('railroad'))
        return 'Despite the name, the Railroad Commission regulates the Texas oil and gas industry — one of the most powerful regulatory bodies in the state. 6-year staggered terms.';
      if (o.includes('state board of education') || o.includes('sboe'))
        return 'The State Board of Education sets curriculum standards for 5.5 million Texas students, selects textbooks, and oversees a $50 billion Permanent School Fund. 4-year term.';
      if (o.includes('tx state senate') || o.includes('state senate'))
        return 'The Texas Senate has 31 members serving 4-year staggered terms. Senators write legislation, confirm gubernatorial appointments, and set the state budget.';
      if (o.includes('tx state house') || o.includes('state house') || o.includes('tx house'))
        return 'The Texas House of Representatives has 150 members serving 2-year terms. All 150 seats are up in 2026. The House originates all revenue bills and sets the state budget.';
      if (o.includes('district clerk'))
        return 'The District Clerk maintains official court records for district courts, including civil, criminal, and family cases. 4-year term, elected countywide.';
      if (o.includes('county clerk'))
        return 'The County Clerk maintains official county records, processes elections, and records deeds, birth certificates, and marriage licenses. 4-year term.';
      if (o.includes('county judge'))
        return 'The County Judge serves as both the presiding judge of the County Court and the head of the Commissioner\'s Court — the governing body of the county. 4-year term.';
      if (o.includes('commissioner'))
        return 'County Commissioners serve on the Commissioner\'s Court — the governing body that sets the county budget, maintains roads and infrastructure, and oversees county services. 4-year term.';
      if (o.includes('sheriff'))
        return 'The Sheriff is the county\'s chief law enforcement officer, overseeing the county jail and providing law enforcement in unincorporated areas. 4-year term.';
      if (o.includes('justice of the peace') || o.includes('j.p.') || o.includes('jp precinct'))
        return 'Justice of the Peace courts handle small claims (under $20,000), Class C misdemeanors, and perform marriages. JP judges do not need to be licensed attorneys in Texas. 4-year term.';
      if (o.includes('supreme court'))
        return 'The Texas Supreme Court is the court of last resort for civil matters. Nine justices are elected statewide to overlapping 6-year terms. Texas is one of few states that elects its supreme court justices.';
      if (o.includes('court of criminal appeals'))
        return 'The Texas Court of Criminal Appeals is the court of last resort for criminal matters — a separate court from the civil Supreme Court. Nine judges serve staggered 6-year terms.';
      if (o.includes('district court') || o.includes('district judge'))
        return 'District Courts are the primary trial courts in Texas, handling civil cases, felony criminal cases, family law, and juvenile matters. Judges serve 4-year terms.';
      if (o.includes('court of appeals'))
        return 'Courts of Appeals are intermediate appellate courts that review decisions from trial courts. Texas has 14 Courts of Appeals. Justices serve 6-year terms.';
      return null; // fall back to race.description
    }

    const POS_COLOR  = { A:'text-blue-700',    B:'text-purple-700',    C:'text-red-700',    D:'text-slate-400' };
    const POS_BG     = { A:'bg-blue-50 border-blue-200',  B:'bg-purple-50 border-purple-200', C:'bg-red-50 border-red-200', D:'bg-slate-50 border-slate-200' };
    const POS_DOT    = { A:'bg-blue-500',  B:'bg-purple-500',  C:'bg-red-500',  D:'bg-slate-300' };
    const POS_LABEL  = { A:'Liberal', B:'Moderate', C:'Conservative', D:'N/A' };

    // ── Candidate quote/profile sheet ──────────────────────────────────────
    function CandidateProfile({ candidate, issues, answers, onClose, onSelect, isSelected, raceName }) {
      const hasAnswers = answers && Object.keys(answers).length > 0;
      const [openIssues, setOpenIssues] = useState({});
      const border = candidate.party === 'D' ? 'border-blue-500' : candidate.party === 'R' ? 'border-red-500' : 'border-slate-300';
      const accentBg = candidate.party === 'D' ? 'bg-blue-800' : candidate.party === 'R' ? 'bg-red-800' : 'bg-slate-800';
      return (
        <div className="fixed inset-0 z-50 flex flex-col bg-black/60 lg:items-center lg:justify-center lg:p-8">
          <div className="flex flex-col bg-white lg:rounded-2xl lg:shadow-2xl lg:max-w-4xl w-full lg:max-h-[90vh] overflow-hidden">
          {/* Header */}
          <div className={`${accentBg} px-6 pt-6 pb-6 relative flex-shrink-0`}>
            <button onClick={onClose} className="absolute top-4 right-4 w-8 h-8 bg-white/20 rounded-full flex items-center justify-center text-white font-bold text-sm hover:bg-white/30">✕</button>

            {/* Mobile: stacked / Desktop: two-column */}
            <div className="flex flex-col lg:flex-row lg:items-center lg:gap-8">

              {/* Left col: photo + party + name + website — fixed width on desktop */}
              <div className="flex items-center gap-4 lg:flex-col lg:items-center lg:text-center lg:w-40 lg:flex-shrink-0">
                {/* Photo + tap-to-add label stacked together */}
                <div className="flex flex-col items-center gap-1 flex-shrink-0">
                  {onSelect ? (
                    <button onClick={onSelect} className="relative active:scale-95 hover:scale-105 transition-transform" title={isSelected ? 'Remove from ballot' : 'Add to ballot'}>
                      <div className={`w-20 h-20 lg:w-28 lg:h-28 rounded-full border-4 overflow-hidden bg-white/20 transition-colors ${isSelected ? (candidate.party === 'D' ? 'border-blue-200' : candidate.party === 'R' ? 'border-red-200' : 'border-slate-200') : 'border-white/50'}`}>
                        <img src={candidate.photo || './icons/candidate-undefined.png'} alt={candidate.name} className="w-full h-full object-cover object-top" onError={e => { e.target.src='./icons/candidate-undefined.png'; e.target.className='w-full h-full object-contain object-bottom'; e.target.style.opacity='0.6'; }} />
                      </div>
                      <span className={`absolute -bottom-0.5 -right-0.5 w-7 h-7 rounded-full flex items-center justify-center text-base font-black border-2 border-white shadow-md transition-colors ${isSelected ? (candidate.party === 'D' ? 'bg-blue-200 text-blue-900' : candidate.party === 'R' ? 'bg-red-200 text-red-900' : 'bg-slate-200 text-slate-900') : 'bg-white text-slate-900'}`}>
                        {isSelected ? '✓' : '+'}
                      </span>
                    </button>
                  ) : (
                    <div className="w-20 h-20 lg:w-28 lg:h-28 rounded-full border-4 border-white/50 overflow-hidden bg-white/20">
                      <img src={candidate.photo || './icons/candidate-undefined.png'} alt={candidate.name} className="w-full h-full object-cover object-top" onError={e => { e.target.src='./icons/candidate-undefined.png'; e.target.className='w-full h-full object-contain object-bottom'; e.target.style.opacity='0.6'; }} />
                    </div>
                  )}
                  {onSelect && (
                    <p className={`text-[9px] font-bold uppercase tracking-widest text-center ${isSelected ? (candidate.party === 'D' ? 'text-blue-200' : candidate.party === 'R' ? 'text-red-200' : 'text-slate-200') : 'text-white/70'}`}>
                      {isSelected ? '✓ On Ballot' : 'Tap to Add'}
                    </p>
                  )}
                </div>
                {/* Name + party + website */}
                <div>
                  <p className="text-white/70 text-xs font-bold uppercase tracking-widest">{candidate.party === 'D' ? 'Democrat' : candidate.party === 'R' ? 'Republican' : 'Independent'}</p>
                  <h2 className="text-white font-black text-xl lg:text-2xl leading-tight">{candidate.name}</h2>
                  <a href={candidate.website || undefined} target="_blank" rel="noopener noreferrer" className="inline-block mt-1.5 text-white/60 hover:text-white transition-colors" title="Visit website">
                    <svg className="w-7 h-7 lg:w-8 lg:h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.5}><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                  </a>
                </div>
              </div>

              {/* Divider — desktop only */}
              <div className="hidden lg:block w-px self-stretch bg-white/20 flex-shrink-0" />

              {/* Right col: hook + summary */}
              <div className="flex-1 lg:py-2">
                {candidate.hook && (
                  <p className="text-white font-black mt-4 lg:mt-0 leading-snug" style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'26px', letterSpacing:'0.01em'}}>
                    {candidate.hook}
                  </p>
                )}
                {candidate.summary && (
                  <p className={`text-white/85 mt-2 leading-relaxed text-[17px] font-medium`}>{candidate.summary}</p>
                )}
              </div>

            </div>
          </div>
          {/* Issue positions — 2 columns on desktop */}
          <div className="flex-1 overflow-y-auto">
            <div className="divide-y divide-slate-100 lg:divide-y-0 lg:columns-2">
              {issues && issues.map((issue, idx) => {
                const pos = candidate.positions?.[issue.id];
                const hasStance = pos === 'A' || pos === 'B' || pos === 'C';
                const voterPos = answers?.[issue.id];
                const isMatch = hasAnswers && voterPos && voterPos !== 'D' && hasStance && pos === voterPos;
                const isMismatch = hasAnswers && voterPos && voterPos !== 'D' && hasStance && pos !== voterPos;
                const posText = issue[pos] || '';
                const evidence = candidate.evidence?.[issue.id];
                const stance = pos === 'A' ? { label: 'Liberal position', word: 'liberal', chip: 'bg-blue-100 text-blue-700' }
                  : pos === 'B' ? { label: 'Moderate position', word: 'moderate', chip: 'bg-purple-100 text-purple-700' }
                  : pos === 'C' ? { label: 'Conservative position', word: 'conservative', chip: 'bg-red-100 text-red-700' }
                  : null;
                const expandable = stance && posText;
                const isOpen = !!openIssues[issue.id];
                return (
                  <div key={issue.id} className={`px-5 py-3 lg:py-4 border-b border-slate-100 ${isMatch ? 'bg-emerald-50' : isMismatch ? 'bg-rose-50' : ''}`}>
                    <div className="flex items-center gap-2 mb-1.5">
                      <div className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${POS_DOT[pos] || 'bg-slate-300'}`} />
                      <span className="text-[11px] lg:text-xs font-black text-slate-500 uppercase tracking-wider">{issue.topic}</span>
                      {isMatch && <span className="ml-auto text-[10px] lg:text-xs font-bold text-emerald-600 bg-emerald-100 px-1.5 py-0.5 rounded-full">✓ Match</span>}
                      {isMismatch && <span className="ml-auto text-[10px] lg:text-xs font-bold text-rose-500 bg-rose-100 px-1.5 py-0.5 rounded-full">✗ Differs</span>}
                    </div>
                    <div className="flex items-center gap-2">
                      {stance ? (
                        <span className={`inline-flex items-center gap-1.5 text-[11px] lg:text-xs font-bold uppercase tracking-wide px-2.5 py-1 rounded-full ${stance.chip}`}>
                          {stance.label}
                          {expandable && (
                            <button
                              onClick={e => { e.stopPropagation(); setOpenIssues(o => ({...o, [issue.id]: !o[issue.id]})); }}
                              className={`w-4 h-4 rounded-full flex items-center justify-center leading-none font-black text-[10px] flex-shrink-0 transition-all ${isOpen ? 'border-2 border-slate-400 text-slate-400' : 'border-2 border-current opacity-50 hover:opacity-100'}`}
                              title={isOpen ? 'Close definition' : 'What does this mean?'}
                            >{isOpen ? '–' : 'i'}</button>
                          )}
                        </span>
                      ) : (
                        <span className="text-sm text-slate-400 italic">No published position found</span>
                      )}
                    </div>
                    {isOpen && expandable && (
                      <p className="text-sm text-slate-500 italic leading-relaxed mt-2">
                        <span className="font-semibold not-italic text-slate-400">The {stance.word} view: </span>
                        "{posText}"
                      </p>
                    )}
                    {evidence && (
                      <p className="text-sm text-slate-600 leading-relaxed mt-2 pl-2.5 border-l-2 border-slate-300">{evidence}</p>
                    )}
                  </div>
                );
              })}
            </div>
            {/* Bottom add-to-ballot CTA */}
            <div className={`px-5 py-4 ${accentBg} flex items-center justify-between gap-4`}>
              <div>
                <p className="text-white font-black text-base leading-tight">{candidate.name}</p>
                <p className="text-white/70 text-xs">{raceName}</p>
              </div>
              <button
                onClick={onSelect}
                className={`flex items-center gap-2 px-5 py-2.5 rounded-full font-black text-sm uppercase tracking-wide transition-all active:scale-95 ${isSelected ? 'bg-white text-slate-900' : 'bg-white/20 text-white border-2 border-white/50 hover:bg-white/30'}`}
              >
                {isSelected ? '✓ On Ballot' : '+ Add to Ballot'}
              </button>
            </div>
          </div>
          </div>
        </div>
      );
    }

    // ── Race detail comparison table ────────────────────────────────────────
    function RaceDetail({ race, issues, answers, ranks, selected, onSelect, onBack, onNextRace, onPrevRace, onQuiz, onHome, inline=false }) {
      const candidates = race.candidates.filter(Boolean).slice(0, 2);
      const hasAnswers = answers && Object.keys(answers).length > 0;
      const currentSelected = selected[race.office];
      const [profileCandidate, setProfileCandidate] = useState(null);
      const [sourceModal, setSourceModal] = useState(null); // { candidate, issue }
      const [panelOpen, setPanelOpen] = useState(false);
      const [isDesktop, setIsDesktop] = useState(window.innerWidth >= 1024);
      useEffect(() => {
        const onResize = () => setIsDesktop(window.innerWidth >= 1024);
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);
      const drag = useRef({active:false, startX:0, startY:0, baseOffset:0, w:165, isHoriz:null});

      // Scroll to top whenever the race changes
      useEffect(() => { window.scrollTo(0, 0); }, [race.office]);

      function getSlides() { return document.querySelectorAll('[data-slide]'); }

      // 3-panel strip: [ME | CandA | CandB]
      // All 3 columns = exactly 1/3 of screen width on any device
      // panelOpen=false: shows ME+CandA | panelOpen=true: shows CandA+CandB

      function getPanelW() { return window.innerWidth / 3; }

      function swipeStart(clientX, clientY) {
        const w = getPanelW();
        drag.current = { active:true, startX:clientX, startY:clientY, baseOffset: panelOpen ? -w : 0, w, isHoriz:null };
        getSlides().forEach(el => el.style.transition = 'none');
      }

      function swipeMove(clientX, clientY) {
        if (!drag.current.active) return;
        const dx = clientX - drag.current.startX;
        const dy = clientY - drag.current.startY;
        if (drag.current.isHoriz === null) {
          if (Math.abs(dx) < 5 && Math.abs(dy) < 5) return;
          drag.current.isHoriz = Math.abs(dx) > Math.abs(dy);
        }
        if (!drag.current.isHoriz) return;
        const offset = Math.max(-drag.current.w, Math.min(0, drag.current.baseOffset + dx));
        getSlides().forEach(el => el.style.transform = `translateX(${offset}px)`);
      }

      function swipeEnd(clientX) {
        if (!drag.current.active || !drag.current.isHoriz) { drag.current.active = false; return; }
        drag.current.active = false;
        const dx = clientX - drag.current.startX;
        getSlides().forEach(el => el.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1)');
        let newOpen = panelOpen;
        if (!panelOpen && dx < -40) newOpen = true;   // swipe left → show both candidates
        else if (panelOpen && dx > 40) newOpen = false; // swipe right → back to ME
        if (newOpen !== panelOpen) {
          setPanelOpen(newOpen);
        } else {
          // Snap back using current panel width
          const snapOffset = panelOpen ? -getPanelW() : 0;
          getSlides().forEach(el => el.style.transform = `translateX(${snapOffset}px)`);
        }
      }

      const touchHandlers = {
        onTouchStart: e => swipeStart(e.touches[0].clientX, e.touches[0].clientY),
        onTouchMove:  e => { if (drag.current.isHoriz) e.preventDefault(); swipeMove(e.touches[0].clientX, e.touches[0].clientY); },
        onTouchEnd:   e => swipeEnd(e.changedTouches[0].clientX),
        onMouseDown:  e => {
          e.preventDefault(); // prevent text selection during drag

          document.body.style.cursor = 'grabbing';
          const moveH = ev => swipeMove(ev.clientX, ev.clientY);
          const upH   = ev => {
            swipeEnd(ev.clientX);
            document.body.style.cursor = '';
            window.removeEventListener('mousemove', moveH);
