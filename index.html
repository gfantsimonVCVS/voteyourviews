                    {onNextRace && <button onClick={onNextRace} className="flex items-center gap-1.5 text-sm font-bold text-slate-600 hover:text-slate-900 transition-colors" style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'15px'}}>Next Race<svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7"/></svg></button>}
                  </div>
                </>
              );
            }
            // 3-panel strip: [ME | CandA | CandB], container=250px, strip=375px (150%)
            // panelOpen=false (default): translateX(0%)       → shows ME+CandA
            // panelOpen=true:            translateX(-33.33%) → shows CandA+CandB
            const SLIDE = { width:'150%', transform: panelOpen?'translateX(-33.33%)':'translateX(0%)', transition:'transform 0.3s cubic-bezier(0.4,0,0.2,1)' };
            const P = '33.33%'; // panel width within 150% strip
            return (
              <>
                {/* ── Sticky header ── */}
                <div className={`sticky z-10 bg-white border-b border-slate-300 shadow-sm flex items-center overflow-hidden ${inline ? 'top-[115px]' : 'top-[88px]'}`}>
                  {/* Frozen: Issue only */}
                  <div className="self-stretch flex-shrink-0 border-r-2 border-slate-400 flex items-center justify-center" style={{width:'33.333%'}}>
                    <span className="text-[11px] font-black text-slate-400 uppercase tracking-wide">Issue</span>
                  </div>
                  {/* 3-panel swipeable header: ME | CandA | CandB */}
                  <div style={{width:'66.666%',overflow:'hidden'}} {...touchHandlers}>
                    <div className="flex" data-slide style={SLIDE}>
                      {/* ME panel */}
                      <div style={{width:P}} className="flex flex-col items-center justify-center gap-1.5 py-3 border-r-2 border-slate-400">
                        <div className="w-14 h-14 rounded-full bg-slate-800 flex items-center justify-center">
                          <span className="text-white font-black text-lg">ME</span>
                        </div>
                        <span className="text-[11px] text-slate-400 font-bold uppercase tracking-wide">My View</span>
                      </div>
                      {/* Candidate panels */}
                      {colCands.map((c, ci) => {
                        const score = hasAnswers ? calcMatch(c, answers) : null;
                        const isChosen = currentSelected === c.name;
                        return (
                          <div key={c.name} style={{width:P}} className={`flex flex-col items-center justify-center gap-1.5 py-3 border-r border-slate-200 ${isChosen?'bg-emerald-50':''}`}>
                            <button onClick={() => setProfileCandidate(c)} className="flex flex-col items-center gap-1 w-full px-1">
                              <div className="w-14 h-14 rounded-full overflow-hidden border-[3px] bg-slate-200"
                                style={{borderColor:candAccent(c)}}>
                                <img src={c.photo||'./icons/candidate-undefined.png'} alt={c.name}
                                  className="w-full h-full object-cover object-top"
                                  onError={e=>{e.target.src='./icons/candidate-undefined.png';e.target.className='w-full h-full object-contain object-bottom';e.target.style.opacity='0.5';}} />
                              </div>
                              <div className="text-center mt-0.5">
                                <div className="text-[14px] font-black text-slate-900 leading-tight">{c.name.split(' ').slice(-1)[0]}</div>
                                <div className="text-[11px] text-slate-500">{c.name.split(' ').slice(0,-1).join(' ')}</div>
                                {score !== null && <div className={`text-[10px] font-black ${score>=60?'text-emerald-600':score>=40?'text-amber-600':'text-rose-500'}`}>{score}%</div>}
                                {isChosen && <div className="text-[10px] font-black text-emerald-600">✓ Chosen</div>}
                              </div>
                            </button>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>

                {/* ── Issue rows ── */}
                <div className="flex-1 divide-y divide-slate-100">
                  {issues && [...issues].sort((a, b) => (ranks?.[b.id]||0) - (ranks?.[a.id]||0)).map((issue, idx) => {
                    const voterPos = answers?.[issue.id];
                    const voterAnswered = voterPos && voterPos !== 'D';
                    const issueRank = ranks?.[issue.id] || 0;
                    return (
                      <div key={issue.id} className={`flex items-stretch min-h-[70px] overflow-hidden ${idx%2===0?'bg-white':'bg-slate-100'}`}>
                        {/* Frozen: Issue icon + name only */}
                        <div className="flex-shrink-0 border-r-2 border-slate-400 flex flex-col items-center justify-center gap-2 text-center px-2 py-3" style={{width:'33.333%'}}>
                          <div className="w-12 h-12 rounded-2xl bg-slate-800 flex items-center justify-center flex-shrink-0 shadow-sm">
                            <img src={`./icons/symbols/${issue.symbol}.png`} alt="" className="w-8 h-8 object-contain"
                              onError={e=>{e.target.parentNode.style.background='#334155';e.target.style.display='none';}} />
                          </div>
                          <span className="text-[10px] font-black text-slate-700 uppercase tracking-wide leading-tight">{issue.topic}</span>
                        </div>
                        {/* 3-panel swipeable: ME | CandA | CandB */}
                        <div style={{width:'66.666%',overflow:'hidden'}} {...touchHandlers}>
                          <div className="flex h-full" data-slide style={SLIDE}>
                            {/* ME panel */}
                            <div style={{width:P}} className="flex flex-col items-center justify-center gap-1 py-2 border-r-2 border-slate-400">
                              {voterPos === 'D' ? (
                                /* Answered but not important */
                                <button onClick={() => onQuiz?.(issue.id)} className="flex flex-col items-center gap-1 group">
                                  <div className="w-12 h-12 rounded-full border-2 border-dashed border-slate-300 bg-slate-50 flex items-center justify-center group-hover:border-slate-400 transition-colors">
                                    <svg className="w-5 h-5 text-slate-300 group-hover:text-slate-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}>
                                      <path strokeLinecap="round" strokeLinejoin="round" d="M18 12H6" />
                                    </svg>
                                  </div>
                                  <span className="text-[8px] font-bold text-slate-300 uppercase tracking-wide group-hover:text-slate-400">Skipped</span>
                                </button>
                              ) : voterAnswered ? (
                                <button onClick={() => onQuiz?.(issue.id)} className="flex flex-col items-center gap-1 group">
                                  <div className={`w-12 h-12 rounded-full flex items-center justify-center text-[10px] font-black border-2 group-hover:opacity-80 transition-opacity ${POS_BG[voterPos]} ${POS_COLOR[voterPos]}`}
                                    style={{borderColor:voterPos==='A'?'#3b82f6':voterPos==='B'?'#7c3aed':voterPos==='C'?'#ef4444':'#94a3b8'}}>
                                    {POS_LABEL[voterPos]?.slice(0,3)}
                                  </div>
                                  {issueRank > 0 && (
                                    <div className="flex gap-0.5">
                                      {[1,2,3,4,5].map(d => (
                                        <div key={d} className={`w-1.5 h-1.5 rounded-full ${d<=Math.round(issueRank/2)?'bg-slate-600':'bg-slate-200'}`} />
                                      ))}
                                    </div>
                                  )}
                                </button>
                              ) : (
                                <button onClick={() => onQuiz?.(issue.id)} className="flex flex-col items-center gap-1 group">
                                  <div className="w-12 h-12 rounded-full border-2 border-dashed border-slate-400 flex items-center justify-center group-hover:border-blue-400 transition-colors">
                                    <svg className="w-6 h-6 text-slate-400 group-hover:text-blue-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                                      <path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" />
                                    </svg>
                                  </div>
                                  <span className="text-[8px] font-bold text-slate-400 group-hover:text-blue-500 transition-colors uppercase tracking-wide">Add View</span>
                                </button>
                              )}
                            </div> {/* end ME panel */}
                            {/* Candidate panels */}
                            {colCands.map(c => {
                              const cPos = c.positions?.[issue.id];
                              const isMatch = voterAnswered && cPos === voterPos;
                              const isMismatch = voterAnswered && voterPos && cPos && cPos !== voterPos;
                              return (
                                <div key={c.name} style={{width:P}} className="flex items-center justify-center py-2 border-r border-slate-200">
                                  {cPos && cPos !== 'D' ? (
                                    <button onClick={() => setSourceModal({candidate:c, issue})} className="relative group active:scale-95 hover:scale-105 transition-transform">
                                      <div className="relative px-2 py-1.5 rounded-xl flex items-center justify-center transition-all duration-150"
                                        style={{border:`2px solid ${candAccent(c)}`, boxShadow:`0 2px 8px ${candAccent(c)}33`, background:'white'}}
                                        onMouseEnter={e=>{e.currentTarget.style.background=candAccent(c); e.currentTarget.querySelector('span').style.color='white';}}
                                        onMouseLeave={e=>{e.currentTarget.style.background='white'; e.currentTarget.querySelector('span').style.color=candAccent(c);}}>
                                        <span className="text-[9px] font-black uppercase tracking-widest transition-colors" style={{color: candAccent(c)}}>My View</span>
                                        <span className="absolute -bottom-[7px] left-1/2 -translate-x-1/2 w-0 h-0"
                                          style={{borderLeft:'6px solid transparent', borderRight:'6px solid transparent', borderTop:`6px solid ${candAccent(c)}`}}/>
                                        <span className="absolute -bottom-[4px] left-1/2 -translate-x-1/2 w-0 h-0"
                                          style={{borderLeft:'5px solid transparent', borderRight:'5px solid transparent', borderTop:'5px solid white'}}/>
                                      </div>
                                      {isMatch && <span className="absolute -top-1 -right-1 text-[8px] bg-emerald-500 text-white rounded-full w-3.5 h-3.5 flex items-center justify-center font-black">✓</span>}
                                      {isMismatch && <span className="absolute -top-1 -right-1 text-[8px] bg-rose-400 text-white rounded-full w-3.5 h-3.5 flex items-center justify-center font-black">✗</span>}
                                    </button>
                                  ) : (
                                    <span className="text-slate-300 text-lg">—</span>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* ── Sticky bottom ── */}
                <div className="sticky bottom-0 bg-white border-t border-slate-200 shadow-lg">
                {/* Nav row: Prev + Next */}
                <div className="flex px-3 py-2 gap-2">
                  {onPrevRace ? (
                    <button onClick={onPrevRace}
                      className="flex-1 py-2 rounded-lg bg-slate-800 text-white flex items-center justify-center gap-1.5 hover:bg-slate-700 transition-colors"
                      style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'15px', fontWeight:700}}>
                      <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg>
                      Prev Race
                    </button>
                  ) : (
                    <button onClick={onBack}
                      className="flex-1 py-2 rounded-lg bg-slate-800 text-white flex items-center justify-center gap-1.5 hover:bg-slate-700 transition-colors"
                      style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'15px', fontWeight:700}}>
                      <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg>
                      All Races
                    </button>
                  )}
                  {onNextRace && (
                    <button onClick={onNextRace}
                      className="flex-1 py-2 rounded-lg bg-slate-800 text-white flex items-center justify-center gap-1.5 hover:bg-slate-700 transition-colors"
                      style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'15px', fontWeight:700}}>
                      Next Race
                      <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7"/></svg>
                    </button>
                  )}
                </div>
                <div className="flex items-center justify-center py-1.5 border-t border-slate-100">
                  <button onClick={onBack} className="text-[11px] font-bold text-slate-400 hover:text-slate-700 transition-colors flex items-center gap-1">
                    <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg>
                    Back to All Races
                  </button>
                </div>
                <div className="flex">
                  <div style={{width:'33.333%'}} />
                  <div style={{width:'66.666%',overflow:'hidden'}} {...touchHandlers}>
                    <div className="flex" data-slide style={SLIDE}>
                      {/* ME spacer */}
                      <div style={{width:P}} />
                      {/* Candidate buttons */}
                      {colCands.map(c => {
                        const isChosen = currentSelected === c.name;
                        const btnColor = isChosen?'bg-emerald-500 hover:bg-emerald-600':c.party==='D'?'bg-blue-600 hover:bg-blue-700':'bg-red-600 hover:bg-red-700';
                        return (
                          <div key={c.name} style={{width:P}} className="px-2 pt-1 pb-2 space-y-1">
                            {/* Candidate name label so buttons are clearly attributed */}
                            <div className="text-center text-[10px] font-black text-slate-500 uppercase tracking-wide truncate">
                              {c.name.split(' ').slice(-1)[0]}
                            </div>
                            <button onClick={() => setProfileCandidate(c)}
                              className={`w-full py-1.5 rounded-lg border transition-colors ${c.party==='D'?'bg-blue-50 border-blue-200 text-blue-700 hover:bg-blue-100':'bg-red-50 border-red-200 text-red-700 hover:bg-red-100'}`}
                              style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'13px', fontWeight:700, letterSpacing:'0.03em'}}>
                              All Issues
                            </button>
                            <button onClick={() => onSelect(race.office, isChosen ? null : c.name)}
                              className={`w-full py-1.5 rounded-lg text-white transition-colors ${btnColor}`}
                              style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'13px', fontWeight:900, letterSpacing:'0.03em'}}>
                              {isChosen ? '✓ On Ballot' : 'Add to Ballot'}
                            </button>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
                </div>
              </>
            );
          })()}
        </div>
        </div>
      );
    }

    function Browse({ county, counties, issues, answers, ranks, selected, setSelected, userDistricts, setUserDistricts, onBallot, onHome, onQuiz, initialRace, clearInitialRace }) {
      const countyData = counties[county];
      const [activeTab, setActiveTab] = useState('federal');
      const [expandedRaces, setExpandedRaces] = useState(new Set());
      const [showFilterModal, setShowFilterModal] = useState(false);
      const [browseProfile, setBrowseProfile] = useState(null); // {candidate, race}

      const TABS = [
        { key: 'federal',  label: 'Federal' },
        { key: 'state',    label: 'State' },
        { key: 'county',   label: 'County' },
        { key: 'judicial', label: 'Judicial' },
      ];

      // Auto-open a race when returning from quiz
      useEffect(() => {
        if (initialRace && countyData) {
          const sec = RACE_SECTIONS.find(s => (countyData[s.key]||[]).some(r => r.office === initialRace.office));
          if (sec) {
            setActiveTab(sec.key);
            setExpandedRaces(prev => new Set([...prev, initialRace.office]));
          }
          clearInitialRace?.();
        }
      }, [initialRace]);

      function toggleRace(office) {
        setExpandedRaces(prev => {
          const next = new Set(prev);
          next.has(office) ? next.delete(office) : next.add(office);
          return next;
        });
      }

      const races = filterRacesByDistrict(countyData[activeTab] || [], userDistricts);
      const selectedCount = Object.keys(selected).length;
      const [showHeaderDrop, setShowHeaderDrop] = useState(false);

      return (
        <div className="bg-slate-100 min-h-screen" onClick={() => setShowHeaderDrop(false)}>
          {/* Header */}
          <header className="bg-white border-b border-slate-200 px-4 py-3.5 sticky top-0 z-10">
            <div className="max-w-5xl mx-auto flex items-center justify-between">
              <button onClick={onHome} className="text-sm text-slate-500 hover:text-slate-800 font-medium">← Home</button>

              {/* Choose Candidates dropdown */}
              <div className="relative" onClick={e => e.stopPropagation()}>
                <div className="text-xs text-slate-400 font-medium text-center leading-none mb-0.5">{counties[county].name}</div>
                <div className="flex rounded-full overflow-hidden border border-slate-300">
                  <button
                    onClick={() => setShowHeaderDrop(d => !d)}
                    className="py-1.5 px-4 font-black text-xs uppercase tracking-widest text-slate-700 hover:text-slate-900 hover:bg-slate-50 transition-all duration-150"
                    style={{letterSpacing:'0.1em'}}>
                    {userDistricts ? 'My Candidates' : 'All Candidates'}
                  </button>
                  <button
                    onClick={() => setShowHeaderDrop(d => !d)}
                    className="px-3 border-l border-slate-300 text-slate-400 hover:text-slate-700 hover:bg-slate-50 transition-colors flex items-center">
                    <svg className={`w-3 h-3 transition-transform ${showHeaderDrop ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}>
                      <path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7"/>
                    </svg>
                  </button>
                </div>
                {showHeaderDrop && (
                  <div className="absolute top-full mt-1 left-0 right-0 rounded-2xl overflow-hidden shadow-xl z-30 border border-slate-200 bg-white min-w-[160px]">
                    <button onClick={() => { setShowHeaderDrop(false); if (setUserDistricts) setUserDistricts(null); }}
                      className={`w-full px-5 py-3 text-left text-xs font-black uppercase tracking-widest hover:bg-slate-50 transition-colors border-b border-slate-100 ${!userDistricts ? 'text-slate-900' : 'text-slate-500'}`}
                      style={{letterSpacing:'0.1em'}}>
                      All Candidates
                    </button>
                    <button onClick={() => { setShowHeaderDrop(false); setShowFilterModal(true); }}
                      className={`w-full px-5 py-3 text-left text-xs font-black uppercase tracking-widest hover:bg-slate-50 transition-colors ${userDistricts ? 'text-slate-900' : 'text-slate-500'}`}
                      style={{letterSpacing:'0.1em'}}>
                      My Candidates
                    </button>
                  </div>
                )}
              </div>

              <div className="w-24" />
            </div>

            {/* Tab bar — segmented control */}
            <div className="max-w-5xl mx-auto mt-3 flex gap-1 p-1 rounded-xl" style={{background:'#0f172a'}}>
              {TABS.map(tab => {
                const isActive = tab.key === activeTab;
                const tabRaces = filterRacesByDistrict(countyData[tab.key] || [], userDistricts);
                const tabSelected = tabRaces.filter(r => selected[r.office]).length;
                return (
                  <button key={tab.key} onClick={() => setActiveTab(tab.key)}
                    className="flex-1 py-2 rounded-lg text-xs lg:text-sm font-black uppercase tracking-tight lg:tracking-widest transition-all duration-150"
                    style={isActive
                      ? {background:'#fff', color:'#0f172a', boxShadow:'0 2px 8px rgba(0,0,0,0.25)'}
                      : {background:'transparent', color:'#94a3b8'}}>
                    {tab.label}
                    {tabSelected > 0 && <span className="ml-1.5 text-emerald-400">·{tabSelected}</span>}
                  </button>
                );
              })}
            </div>
          </header>

          {/* District chips */}
          {userDistricts && (
            <div className="max-w-5xl mx-auto px-4 pt-3 flex flex-wrap gap-1.5">
              {userDistricts.congressionalDistrict && <span className="text-xs px-2.5 py-1 bg-white text-slate-600 rounded-full border border-slate-200 font-semibold shadow-sm">US House · Dist. {userDistricts.congressionalDistrict}</span>}
              {userDistricts.stateSenate && <span className="text-xs px-2.5 py-1 bg-white text-slate-600 rounded-full border border-slate-200 font-semibold shadow-sm">TX Senate · Dist. {userDistricts.stateSenate}</span>}
              {userDistricts.stateHouse && <span className="text-xs px-2.5 py-1 bg-white text-slate-600 rounded-full border border-slate-200 font-semibold shadow-sm">TX House · Dist. {userDistricts.stateHouse}</span>}
              {userDistricts.jpPrecinct && <span className="text-xs px-2.5 py-1 bg-white text-slate-600 rounded-full border border-slate-200 font-semibold shadow-sm">JP Pct {userDistricts.jpPrecinct}</span>}
              {userDistricts.commissionerPrecinct && <span className="text-xs px-2.5 py-1 bg-white text-slate-600 rounded-full border border-slate-200 font-semibold shadow-sm">Comm. Pct {userDistricts.commissionerPrecinct}</span>}
            </div>
          )}

          {/* Race list */}
          <main className="max-w-5xl mx-auto px-4 py-4 space-y-2">
            {races.length === 0 && (
              <div className="text-center py-16 text-slate-400 text-sm">No races in this category for your district.</div>
            )}
            {races.map(race => {
              const isExpanded = expandedRaces.has(race.office);
              const isSelected = !!selected[race.office];
              const score = answers && Object.keys(answers).length > 0
                ? Math.max(...race.candidates.filter(Boolean).map(c => calcMatch(c, answers) || 0))
                : null;
              return (
                <div key={race.office} id={'race-'+race.office.replace(/\s+/g,'-')} className="rounded-2xl shadow-sm border border-slate-800" style={{overflow: isExpanded ? 'visible' : 'hidden'}}>
                  {/* Dark header */}
                  <div className="sticky top-0 z-20 w-full flex flex-col lg:flex-row"
                    style={{background:'linear-gradient(135deg,#0f172a 0%,#1e293b 100%)'}}>

                    {/* Mobile: full-width title row / Desktop: left 50% (title + description) */}
                    <button onClick={() => toggleRace(race.office)}
                      className="w-full lg:w-1/2 flex text-left hover:brightness-110 transition-all cursor-pointer border-b border-white/10 lg:border-b-0 lg:border-r lg:border-white/20">
                      {/* Title col */}
                      <div className="flex-1 lg:w-1/2 px-5 py-4 lg:py-5 flex items-center justify-center lg:flex-col lg:items-center lg:justify-center border-r border-white/20">
                        {isSelected && <span className="text-sm text-emerald-400 font-bold mr-2 lg:mr-0 lg:mb-2">✓</span>}
                        <h2 className="text-white font-black uppercase leading-tight text-center"
                          style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'20px', letterSpacing:'0.04em'}}>
                          {race.office.replace(/ of Texas$/i,'').replace(/ of the State of Texas$/i,'').replace(/\s*[–—-]\s*(?=District)/i,' • ')}
                        </h2>
                      </div>
                      {/* Description col — desktop only */}
                      <div className="hidden lg:flex w-1/2 px-5 py-5 flex-col justify-center">
                        {(() => {
                          const info = getOfficeInfo(race.office);
                          const txt = info || race.description;
                          return txt ? <p className="text-slate-400 text-xs leading-relaxed">{txt}</p> : null;
                        })()}
                        {isSelected && <div className="text-xs text-emerald-400 font-bold mt-2">✓ {selected[race.office]}</div>}
                      </div>
                    </button>

                    {/* Candidate columns — 50/50 on mobile, 25/25 on desktop */}
                    <div className="w-full lg:w-1/2 flex relative">
                      {/* Compare button — mobile only, centered between candidates */}
                      <button
                        className={`absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 z-10 px-3 py-1.5 lg:px-4 lg:py-2 rounded-full text-[9px] lg:text-[11px] font-black uppercase tracking-widest border hover:scale-105 active:scale-95 transition-all duration-150 ${isExpanded ? 'bg-white text-slate-900 border-white hover:bg-white/90' : 'text-white border-white/30 hover:border-white/70 hover:bg-white/20'}`}
                        style={{background: isExpanded ? undefined : 'rgba(15,23,42,0.95)', letterSpacing:'0.1em'}}

                          </button>
                        );
                      })}

                  {/* Expanded inline grid */}
                  {isExpanded && (
                    <div>
                      <RaceDetail
                        race={race}
                        issues={issues}
                        answers={answers}
                        ranks={ranks}
                        selected={selected}
                        onSelect={(office, name) => setSelected(prev => name ? {...prev, [office]: name} : Object.fromEntries(Object.entries(prev).filter(([k]) => k !== office)))}
                        onBack={() => toggleRace(race.office)}
                        onNextRace={null}
                        onPrevRace={null}
                        onQuiz={(id) => onQuiz(id, race)}

                  )}

            {selectedCount > 0 && (
              <div className="pt-2 pb-6">
                <button onClick={onBallot}
                  className="w-full py-4 bg-slate-900 text-white font-black rounded-xl hover:bg-slate-700 transition-colors text-sm tracking-wide">
                  Build My Ballot ({selectedCount} race{selectedCount !== 1 ? 's' : ''} selected) →
                </button>
              </div>
            )}
          </main>

          {showFilterModal && (
            <AddressModal
              county={county || 'hays'}
              accentColor="#2563eb"
              onClose={() => setShowFilterModal(false)}
              onContinue={(districts) => { if (setUserDistricts) setUserDistricts(districts); setShowFilterModal(false); }}
              onShowAll={() => { if (setUserDistricts) setUserDistricts(null); setShowFilterModal(false); }}

          {browseProfile && (
            <CandidateProfile
              candidate={browseProfile.candidate}
              issues={issues}
              answers={answers}
              onClose={() => setBrowseProfile(null)}

              onSelect={() => setSelected(prev => {
                const isChosen = prev[browseProfile.race.office] === browseProfile.candidate.name;
                return isChosen
                  ? Object.fromEntries(Object.entries(prev).filter(([k]) => k !== browseProfile.race.office))

    function BrowseRaceCard({ race, answers, selected, onToggle }) {

    // ─── BALLOT ───
    function Ballot({ county, counties, selected, answers, issues, userDistricts, onHome, onEdit }) {
      const countyData = counties[county];
      const hasAnswers = answers && Object.keys(answers).length > 0;

      // Set document title for PDF filename when printing
      useEffect(() => {
        const today = new Date();
        const month = today.toLocaleString('default', { month: 'long' });
        const day = today.getDate();
        const year = today.getFullYear();
        document.title = `My Midterm Ballot - ${month} ${day} ${year}`;
        return () => { document.title = 'Vote Your Views — Texas Voter Guide 2026'; };
      }, []);

      // For each race: get chosen candidate OR best match OR first candidate
      function getBestCandidate(race) {
        const chosen = race.candidates.find(c => c.name === selected[race.office]);
        if (chosen) return { candidate: chosen, isChosen: true };
        if (hasAnswers) {
          const scored = race.candidates.filter(Boolean).map(c => ({ candidate: c, score: calcMatch(c, answers) })).filter(s => s.score !== null).sort((a,b) => b.score - a.score);
          if (scored.length > 0) return { candidate: scored[0].candidate, isChosen: false };
        }
        return { candidate: race.candidates.filter(Boolean)[0], isChosen: false };
      }

      function formatOffice(raw) {
        const o = raw.replace(/ of Texas$/i, '').trim();
        if (o.includes(' — ')) {
          const [a, b] = o.split(' — ');
          return [a.replace(/^TX /, ''), b];
        }
        if (o.includes(' • ')) { const [a,b] = o.split(' • '); return [a, b]; }
        const dist = o.match(/^(.+?)\s+(District\s+\d+)$/i);
        if (dist) return [dist[1], dist[2]];
        const pct = o.match(/^(.+?),?\s+(Pct\.?\s*\d+)$/i);
        if (pct) return [pct[1], 'Pct. ' + pct[2].replace(/pct\.?\s*/i,'')];
        const noMatch = o.match(/^(.+?)\s+(No\.\s*\d+)$/i);
        if (noMatch) return [noMatch[1], noMatch[2]];
        const map = {
          'U.S. Senate': ['U.S.', 'Senate'],
          'Governor': ['Governor', ''],
          'Lieutenant Governor': ['Lieutenant', 'Governor'],
          'Attorney General': ['Attorney', 'General'],
          'Comptroller of Public Accounts': ['Comptroller', 'Public Accounts'],
          'Commissioner of General Land Office': ['Commissioner', 'Land Office'],
          'Commissioner of Agriculture': ['Commissioner', 'Agriculture'],
          'Railroad Commissioner': ['Railroad', 'Commissioner'],
          'Hays County Judge': ['County', 'Judge'],
          'Criminal District Attorney': ['District', 'Attorney'],
          'District Clerk': ['District', 'Clerk'],
          'County Clerk': ['County', 'Clerk'],
          'County Treasurer': ['County', 'Treasurer'],
        };
        if (map[o]) return map[o];
        const words = o.split(' ');
        if (words.length >= 3) { const m = Math.ceil(words.length / 2); return [words.slice(0,m).join(' '), words.slice(m).join(' ')]; }
        return [o, ''];
      }

      const allRaces = RACE_SECTIONS.flatMap(sec => filterRacesByDistrict(countyData[sec.key] || [], userDistricts));
      const ballotCandidates = allRaces.map(race => {
        const { candidate } = getBestCandidate(race);
        if (!candidate) return null;
        return { race, candidate };
      }).filter(Boolean);

      return (
        <div className="min-h-screen" style={{background:'#f8fafc'}}>
          {/* Screen-only nav bar */}
          <header className="no-print sticky top-0 z-10 px-4 py-3 flex items-center justify-between"
            style={{background:'#0f172a', borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
            <button onClick={onHome} className="text-slate-400 hover:text-white text-sm font-semibold flex items-center gap-1.5">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg>
              Back
            </button>
            <div className="text-white font-black text-sm uppercase tracking-widest" style={{fontFamily:"'Barlow Condensed',sans-serif"}}>Your Candidate Guide</div>
            <button onClick={() => window.print()} className="flex items-center gap-1.5 text-sm font-black uppercase tracking-wider px-4 py-2 rounded-full text-white"
              style={{background:'#2563eb', letterSpacing:'0.08em'}}>
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
              Print
            </button>
          </header>

          {/* Hero header — shows on screen AND prints */}
          <div style={{background:'#fff', borderBottom:'4px solid #0f172a', padding:'16px 40px 14px'}}>
            <div style={{maxWidth:'900px', margin:'0 auto', textAlign:'center'}}>
              {/* Top accent line */}
              <div style={{width:'60px', height:'5px', background:'#2563eb', borderRadius:'3px', marginBottom:'12px', margin:'0 auto 12px'}} />
              <div style={{display:'flex', alignItems:'center', gap:'16px', flexWrap:'wrap', justifyContent:'center'}}>
                <img src="./icons/VoteYourViews_Logo_Black.png" alt="VoteYourViews" style={{height:'52px', display:'block'}} />
                <div className="font-black uppercase" style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'40px', color:'#0f172a', letterSpacing:'0.04em', lineHeight:0.95}}>
                  2026 Midterm Guide
                </div>
              </div>
              <div className="font-black uppercase" style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'16px', color:'#2563eb', letterSpacing:'0.1em', marginTop:'4px'}}>
                Early Voting: Oct 19–30 · Election Day: Nov 4, 2026
              </div>

              <div style={{marginTop:'18px', display:'inline-flex', justifyContent:'center', alignItems:'stretch', gap:'0', background:'#f1f5f9', borderRadius:'12px', overflow:'hidden', border:'1.5px solid #e2e8f0'}}>
                {/* Polling locations */}
                <div style={{padding:'14px 20px'}}>
                  <div style={{color:'#64748b', fontSize:'9px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.12em', marginBottom:'10px'}}>Your Closest Polling Locations</div>
                  <div style={{display:'flex', flexDirection:'column', gap:'8px'}}>
                    <div>
                      <div style={{color:'#0f172a', fontSize:'13px', fontWeight:900, lineHeight:1.2}}>Dripping Springs High School</div>
                      <div style={{color:'#64748b', fontSize:'11px'}}>940 W Hwy 290, Dripping Springs, TX 78620</div>
                    </div>
                    <div>
                      <div style={{color:'#0f172a', fontSize:'13px', fontWeight:900, lineHeight:1.2}}>Dripping Springs Ranch Park</div>
                      <div style={{color:'#64748b', fontSize:'11px'}}>1042 Event Center Dr, Dripping Springs, TX 78620</div>
                    </div>
                  </div>
                </div>
                {/* QR code */}
                <div style={{background:'#fff', padding:'14px 16px', borderLeft:'1.5px solid #e2e8f0', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:'6px'}}>
                  <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://www.haysvotes.com/polling-locations" alt="QR code" style={{width:'72px', height:'72px', display:'block'}} />
                  <div style={{color:'#64748b', fontSize:'8px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.08em', textAlign:'center'}}>More Locations</div>
                </div>
                {/* Tagline */}
                <div style={{padding:'14px 20px', borderLeft:'1.5px solid #e2e8f0', display:'flex', alignItems:'center'}}>
                  <div className="font-black uppercase" style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'22px', lineHeight:1.15, letterSpacing:'0.03em', color:'#0f172a'}}>
                    <span style={{color:'#f87171'}}>STOP</span> voting parties.<br/>
                    <span style={{color:'#60a5fa'}}>START</span> voting your views.
                  </div>
                </div>
              </div>
            </div>
          </div>

          <main className="px-4 py-3 fade-in" style={{maxWidth:'960px', margin:'0 auto'}}>
            {RACE_SECTIONS.map(sec => {
              const sectionRaces = filterRacesByDistrict(countyData[sec.key] || [], userDistricts);
              const sectionCandidates = sectionRaces.map(race => {
                const { candidate } = getBestCandidate(race);
                return candidate ? { race, candidate } : null;
              }).filter(Boolean);
              if (!sectionCandidates.length) return null;
              return (
                <div key={sec.key} className="mb-4" style={{breakInside:'avoid', pageBreakInside:'avoid'}}>
                  <div className="flex items-center gap-3 mb-2 pb-1" style={{borderBottom:'2px solid #0f172a'}}>
                    <div className="font-black uppercase tracking-widest" style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'15px', color:'#0f172a', letterSpacing:'0.1em'}}>{sec.label}</div>
                  </div>
                  <div className="grid gap-2" style={{gridTemplateColumns:'repeat(auto-fill, minmax(110px, 1fr))'}}>
                    {sectionCandidates.map(({ race, candidate }) => {
              const partyColor = candidate.party === 'D' ? '#2563eb' : candidate.party === 'R' ? '#dc2626' : '#64748b';
                const partyLabel = candidate.party === 'D' ? 'Democrat' : candidate.party === 'R' ? 'Republican' : candidate.party || 'Independent';
                const [officeLine1, officeLine2] = formatOffice(race.office);
                return (
                  <div key={race.office}
                    className="flex flex-col items-center text-center rounded-xl p-2 gap-0.5"
                    style={{background:'#fff', border:'1.5px solid #e2e8f0', breakInside:'avoid', pageBreakInside:'avoid'}}>
                    {/* Office — 2 lines */}
                    <div className="w-full leading-none" style={{minHeight:'2.2em'}}>
                      <div style={{fontSize:'8px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.07em', color:'#64748b'}}>{officeLine1}</div>
                      {officeLine2 && <div style={{fontSize:'8px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.07em', color:'#64748b'}}>{officeLine2}</div>}
                    </div>
                    {/* Name */}
                    <div style={{fontSize:'11px', fontWeight:900, lineHeight:1.2, color:'#0f172a'}}>
                      {candidate.name}
                    </div>
                    {/* Photo */}
                    <div className="rounded-full overflow-hidden flex-shrink-0 my-1"
                      style={{width:'54px', height:'54px', border:`2px solid ${partyColor}`, background:'#f1f5f9'}}>
                      <img src={candidate.photo || './icons/candidate-undefined.png'} alt={candidate.name}
                        className="w-full h-full object-cover object-top"
                        onError={e=>{e.target.src='./icons/candidate-undefined.png';e.target.style.opacity='0.35';}} />
                    </div>
                    {/* Party */}
                    <div style={{fontSize:'9px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.07em', color: partyColor}}>
                      {partyLabel}
                    </div>
                  </div>
                    );
                  })}
                  </div>
                </div>
              );
            })}

            <div className="no-print flex gap-3 mt-8 pb-6">
              <button onClick={onHome}
                className="flex-1 py-3 rounded-xl font-bold text-sm"
                style={{border:'1.5px solid #e2e8f0', color:'#475569'}}>
                ← Back to Home
              </button>
              <button onClick={() => window.print()}
                className="flex-1 py-3 rounded-xl font-black text-sm text-white"
                style={{background:'#0f172a'}}>
                🖨 Print Ballot
              </button>
            </div>

            {/* Print footer — fixed to bottom of every printed page */}
            <div className="ballot-print-footer" style={{display:'none'}}>
              {counties[county].name} · VoteYourViews.org · A State Over Party Initiative · voteyourviews.org
            </div>
          </main>
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // LOADING / ERROR SCREENS
    // ─────────────────────────────────────────────
    function LoadingScreen() {
      return (
        <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 fade-in">
          <div className="w-8 h-8 border-2 border-slate-300 border-t-slate-800 rounded-full animate-spin mb-4" />
          <div className="text-sm font-semibold text-slate-600">Loading candidate data…</div>
          <div className="text-xs text-slate-400 mt-1">Fetching from Google Sheets</div>
        </div>
      );
    }

    function ErrorScreen({ message, onRetry }) {
      return (
        <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 px-6 fade-in">
          <div className="max-w-md text-center">
            <div className="text-3xl mb-4">⚠️</div>
            <h2 className="text-lg font-bold text-slate-900 mb-2">Couldn't load candidate data</h2>
            <p className="text-sm text-slate-500 mb-2">{message}</p>
            <p className="text-xs text-slate-400 mb-6">
              Make sure your Google Sheets are published to the web (File → Share → Publish to web) and that the Sheet IDs are set correctly in the SHEETS config in the code.
            </p>
            <button
              onClick={onRetry}
              className="px-6 py-3 bg-slate-900 text-white font-bold rounded-xl text-sm hover:bg-slate-700 transition-colors"
            >
              Try Again
            </button>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // APP — main state machine
    // ─────────────────────────────────────────────
    function App() {
      const _params = new URLSearchParams(window.location.search);
      const [screen, setScreen] = useState(_params.get('testBallot') === '1' ? 'loading' : SHEETS.master ? 'loading' : 'landing');
      const [county, setCounty] = useState('hays');
      // ?persist=1 in URL uses localStorage (for testing); otherwise sessionStorage (clears on new visit)
      const store = new URLSearchParams(window.location.search).get('persist') === '1' ? localStorage : sessionStorage;
      const [answers, setAnswers] = useState(() => { try { return JSON.parse(store.getItem('vyv_answers') || '{}'); } catch(e) { return {}; } });
      const [ranks, setRanks] = useState(() => { try { return JSON.parse(store.getItem('vyv_ranks') || '{}'); } catch(e) { return {}; } });
      const [selected, setSelected] = useState({});
      const [issues, setIssues] = useState(ISSUES);
      const [counties, setCounties] = useState(COUNTIES);
      const [loadError, setLoadError] = useState(null);
      const [dataSource, setDataSource] = useState(SHEETS.master ? 'loading' : 'demo');
      const [userDistricts, setUserDistricts] = useState(
        new URLSearchParams(window.location.search).get('testDistricts') === '1'
          ? { congressionalDistrict:'21', stateSenate:'25', stateHouse:'73', commissionerPrecinct:'4', jpPrecinct:'4' }
          : null
      );
      const [pendingScreen, setPendingScreen] = useState('quiz');

      // Persist answers + ranks
      React.useEffect(() => { try { store.setItem('vyv_answers', JSON.stringify(answers)); } catch(e) {} }, [answers]);
      React.useEffect(() => { try { store.setItem('vyv_ranks', JSON.stringify(ranks)); } catch(e) {} }, [ranks]);
      const [startIssueId, setStartIssueId] = useState(null);
      const [returnToSummary, setReturnToSummary] = useState(false);
      const [returnToRace, setReturnToRace] = useState(null);   // { office } → go back to RaceDetail after quiz
      const [initialRace, setInitialRace] = useState(null);     // passed to Browse to auto-open a race

      async function loadFromSheets() {
        setScreen('loading');
        setLoadError(null);
        try {
          const [issueRows, statewideRows] = await Promise.all([
            fetchSheet(SHEETS.master, 'issues'),
            fetchSheet(SHEETS.master, 'statewide'),
          ]);
          const rawIssues = buildIssues(issueRows);
          const builtIssues = [...GRID_ORDER.map(id => rawIssues.find(i => i.id === id)).filter(Boolean), ...rawIssues.filter(i => !GRID_ORDER.includes(i.id))];
          const statewideRaces = buildRaces(statewideRows);

          const builtCounties = {};
          for (const [key, meta] of Object.entries(COUNTY_META)) {
            builtCounties[key] = { ...meta, available: false, statewide: statewideRaces, local: [] };
            const countySheetId = SHEETS.counties[key];
            let localRaces = [];
            if (countySheetId) {
              try {
                const localRows = await fetchSheet(countySheetId, 'candidates');
                localRaces = buildRaces(localRows);
              } catch (_) {}
              builtCounties[key].available = statewideRaces.length > 0;
            }
            Object.assign(builtCounties[key], buildCountyRaces(statewideRaces, localRaces));
          }

          setIssues(builtIssues);
          setCounties(builtCounties);
          setDataSource('sheets');
          setScreen(new URLSearchParams(window.location.search).get('testBallot') === '1' ? 'ballot' : 'landing');
        } catch (err) {
          setLoadError(err.message);
          setDataSource('error');
          setScreen('error');
        }
      }

      useEffect(() => {
        if (SHEETS.master) loadFromSheets();
      }, []);

      function goToAddress(destination) {
        setPendingScreen(destination);
        setScreen('address');
      }

      if (screen === 'loading') return <LoadingScreen />;
      if (screen === 'error')   return <ErrorScreen message={loadError} onRetry={loadFromSheets} />;

      if (screen === 'landing') {
        return (
          <Landing
            county={county}
            setCounty={setCounty}
            counties={counties}
            dataSource={dataSource}
            issues={issues}
            answers={answers}
            onQuiz={(id) => { setStartIssueId(id || null); setPendingScreen('landing'); setScreen('quiz'); }}
            onSummary={() => setScreen('summary')}
            onStartOver={() => { setAnswers({}); setRanks({}); setSelected({}); setStartIssueId(null); store.removeItem('vyv_answers'); store.removeItem('vyv_ranks'); }}
            onBrowse={() => setScreen('browse')}
          />
        );
      }

      if (screen === 'address') {
        return (
          <AddressScreen
            county={county}
            onContinue={districts => {
              setUserDistricts(districts);
              if (pendingScreen === 'quiz') { setAnswers({}); setRanks({}); setSelected({}); }
              setScreen(pendingScreen);
            }}
            onSkip={() => {
              setUserDistricts(null);
              if (pendingScreen === 'quiz') { setAnswers({}); setRanks({}); setSelected({}); }
              setScreen(pendingScreen);
            }}
            onBack={() => setScreen(pendingScreen === 'results' ? 'summary' : 'landing')}
          />
        );
      }

      if (screen === 'quiz') {
        const issue = issues.find(i => i.id === startIssueId) || issues[0];
        return (
          <Quiz
            key={startIssueId}
            issue={issue}
            initialAnswer={answers[issue?.id] || null}
            initialRank={ranks[issue?.id] || null}
            onSave={(answer, rank) => {
              setAnswers(prev => ({ ...prev, [issue.id]: answer }));
              setRanks(prev => ({ ...prev, [issue.id]: rank }));
              setStartIssueId(null);
              if (returnToRace) {
                setInitialRace(returnToRace);
                setReturnToRace(null);
                setScreen('browse');
              } else {
                setScreen('landing');
              }
            }}
            onBack={() => {
              setStartIssueId(null);
              if (returnToRace) { setInitialRace(returnToRace); setReturnToRace(null); setScreen('browse'); }
              else if (pendingScreen === 'summary') setScreen('summary');
              else setScreen('landing');
            }}
            onStartOver={() => { setAnswers({}); setRanks({}); setSelected({}); setStartIssueId(null); setScreen('landing'); store.removeItem('vyv_answers'); store.removeItem('vyv_ranks'); }}
          />
        );
      }

      if (screen === 'summary') {
        return (
          <Summary
            issues={issues}
            answers={answers}
            ranks={ranks}
            county={county}
            onMatchAll={() => setScreen('browse')}
            onBallot={(districts) => { if (districts) setUserDistricts(districts); setScreen('ballot'); }}
            onMatchMine={(districts) => { setUserDistricts(districts); setScreen('results'); }}
            onViewConstellation={() => setScreen('constellation')}
            onAnswerMore={(id) => { setStartIssueId(id); setPendingScreen('summary'); setScreen('quiz'); }}
            onHome={() => { setStartIssueId(null); setScreen('landing'); }}
            onStartOver={() => { setAnswers({}); setRanks({}); setSelected({}); setStartIssueId(null); setScreen('landing'); store.removeItem('vyv_answers'); store.removeItem('vyv_ranks'); }}
          />
        );
      }

      if (screen === 'constellation') {
        return (
          <ConstellationScreen
            issues={issues}
            answers={answers}
            ranks={ranks}
            onContinue={() => goToAddress('results')}
            onRetake={() => { setAnswers({}); setRanks({}); setSelected({}); setStartIssueId(null); setScreen('landing'); store.removeItem('vyv_answers'); store.removeItem('vyv_ranks'); }}
          />
        );
      }

      if (screen === 'results') {
        return (
          <Results
            county={county}
            counties={counties}
            issues={issues}
            answers={answers}
            selected={selected}
            setSelected={setSelected}
            userDistricts={userDistricts}
            onBallot={() => setScreen('ballot')}
            onRetake={() => { setAnswers({}); setRanks({}); setSelected({}); setStartIssueId(null); setScreen('landing'); store.removeItem('vyv_answers'); store.removeItem('vyv_ranks'); }}
            onBrowse={() => setScreen('browse')}
          />
        );
      }

      if (screen === 'browse') {
        return (
          <Browse
            county={county}
            counties={counties}
            issues={issues}
            answers={answers}
            ranks={ranks}
            selected={selected}
            setSelected={setSelected}
            userDistricts={userDistricts}
            setUserDistricts={setUserDistricts}
            onBallot={() => setScreen('ballot')}
            onHome={() => setScreen('landing')}
            onQuiz={(id, race) => {
              setStartIssueId(id || null);
              if (race) setReturnToRace({ office: race.office });
              setScreen('quiz');
            }}
            initialRace={initialRace}
            clearInitialRace={() => setInitialRace(null)}
          />
        );
      }

      if (screen === 'ballot') {
        return (
          <Ballot
            county={county}
            counties={counties}
            selected={selected}
            answers={answers}
            issues={issues}
            userDistricts={userDistricts}
            onHome={() => setScreen('landing')}
            onEdit={() => setScreen(Object.keys(answers).length > 0 ? 'results' : 'browse')}
          />
        );
      }

      return null;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
